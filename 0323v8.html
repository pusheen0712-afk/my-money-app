    <script>
        // 捕捉所有未預期的錯誤並顯示在畫面上
        window.onerror = function(message, source, lineno, colno, error) {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.innerHTML = `
                    <div class="p-8 text-center bg-white rounded-3xl shadow-xl max-w-xs mx-auto z-50 relative">
                        <p class="text-red-500 font-bold mb-4 text-lg">發生未預期錯誤</p>
                        <p class="text-xs text-gray-600 mb-2 text-left break-all">${message}</p>
                        <p class="text-xs text-gray-400 mb-4 text-left break-all">Line: ${lineno}:${colno}</p>
                        <button onclick="window.location.reload()" class="w-full py-3 bg-[#6B8EAD] text-white rounded-2xl font-bold active:scale-95 transition-transform">重新整理</button>
                    </div>
                `;
                loader.style.opacity = '1';
            }
        };

        // 資源載入檢查 (非 Babel 編譯區，確保最快執行)
        window.addEventListener('load', () => {
            const missing = [];
            if (typeof React === 'undefined') missing.push('React');
            if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
            if (typeof LucideReact === 'undefined') missing.push('LucideReact');
            if (typeof PropTypes === 'undefined') missing.push('PropTypes');
            if (typeof Recharts === 'undefined') missing.push('Recharts');
            if (typeof dateFns === 'undefined') missing.push('date-fns');
            
            if (missing.length > 0) {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.innerHTML = `
                        <div class="p-8 text-center bg-white rounded-3xl shadow-xl max-w-xs mx-auto">
                            <p class="text-red-500 font-bold mb-4 text-lg">資源載入失敗</p>

                            <div class="bg-red-50 p-3 rounded-2xl text-xs text-red-700 font-mono mb-4">
                                ${missing.join('<br>')}
                            </div>

                        </div>
                    `;
                }
            }
        });

    const saved = localStorage.getItem('projects');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        const defaultProj = parsed.find((p: any) => p.id === 'default');
        if (defaultProj) return defaultProj.name;
      } catch (e) {
        console.error('Failed to parse projects from localStorage', e);
      }
    }
    return '日常支出';
  });

  // --- State ---
  useEffect(() => {
    const isCleared = localStorage.getItem('v1_cleared');
    if (!isCleared) {
      localStorage.clear();
      localStorage.setItem('v1_cleared', 'true');
    }
  }, []);

  const safeJSONParse = (key: string, fallback: any) => {
    const saved = localStorage.getItem(key);
    if (!saved) return fallback;
    try {
      return JSON.parse(saved);
    } catch (e) {
      console.error(`Failed to parse ${key} from localStorage`, e);
      return fallback;
    }
  };

  const [paymentMethods, setPaymentMethods] = useState(initialPaymentMethods);
  const [itemMap, setItemMap] = useState(() => safeJSONParse('itemMap', itemCategoryMap));
  const currencies = ['TWD', 'JPY', 'KRW', 'THB', 'USD', 'EUR'];
  const [projects, setProjects] = useState(() => {
    const saved = localStorage.getItem('projects');
    let loadedProjects: Project[] = [];
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        loadedProjects = parsed.map((p: any) => ({
          ...p,
          location: p.location || (p.currency === 'TWD' ? '國內' : '國外')
        }));
      } catch (e) {
        console.error('Failed to parse projects from localStorage', e);
      }
    }
    
    // Ensure default project exists
    if (!loadedProjects.some(p => p.id === 'default')) {
      loadedProjects.unshift({ id: 'default', name: '日常支出', status: 'Active', currency: 'TWD', location: '國內' });
    }
    
    return loadedProjects;
  });
  const [transactions, setTransactions] = useState(() => safeJSONParse('transactions', initialTransactions));
  const [cards, setCards] = useState(() => safeJSONParse('cards', initialCards));
  const [banks, setBanks] = useState(() => safeJSONParse('banks', initialBanks));
  const [memos, setMemos] = useState(() => safeJSONParse('memos', initialMemos));
  const [stocks, setStocks] = useState(() => safeJSONParse('stocks', initialStocks));
  const [stockOptions, setStockOptions] = useState(() => safeJSONParse('stockOptions', initialStockOptions));
  // 👇 從這裡開始加入 👇
  const [budget, setBudget] = useState(() => {
    const saved = localStorage.getItem('budget');
    if (saved !== null) {
        return JSON.parse(saved);
    }
    return 30000; // 預設預算 30000
  });
  // 👆 加入到這裡結束 👆
  useEffect(() => {
    localStorage.setItem('transactions', JSON.stringify(transactions));
    localStorage.setItem('cards', JSON.stringify(cards));
    localStorage.setItem('banks', JSON.stringify(banks));
    localStorage.setItem('memos', JSON.stringify(memos));
    localStorage.setItem('stocks', JSON.stringify(stocks));
    localStorage.setItem('stockOptions', JSON.stringify(stockOptions));
    localStorage.setItem('itemMap', JSON.stringify(itemMap));
    localStorage.setItem('projects', JSON.stringify(projects));
    localStorage.setItem('budget', JSON.stringify(budget));
  }, [transactions, cards, banks, memos, stocks, stockOptions, itemMap, projects, budget]);

  // --- Modals State ---
  const [isTxModalOpen, setIsTxModalOpen] = useState(false);
  const [isProjectModalOpen, setIsProjectModalOpen] = useState(false);
  const [isConfirmClearModalOpen, setIsConfirmClearModalOpen] = useState(false);
  const [isConfirmClearAllModalOpen, setIsConfirmClearAllModalOpen] = useState(false);
  const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
  const [isMonthPickerOpen, setIsMonthPickerOpen] = useState(false);
  const [pickerYear, setPickerYear] = useState(new Date().getFullYear());
  const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
  const [isAlertModalOpen, setIsAlertModalOpen] = useState(false);
  const [alertMessage, setAlertMessage] = useState('');

  const showAlert = (message: string) => {
    setAlertMessage(message);
    setIsAlertModalOpen(true);
  };
  const [isCardModalOpen, setIsCardModalOpen] = useState(false);
  const [isBankModalOpen, setIsBankModalOpen] = useState(false);
  const [isMemoModalOpen, setIsMemoModalOpen] = useState(false);
  const [isRecordModalOpen, setIsRecordModalOpen] = useState(false);
  const [isStockModalOpen, setIsStockModalOpen] = useState(false);
  const [isUpdatingStocks, setIsUpdatingStocks] = useState(false);
  const [confirmingRecurring, setConfirmingRecurring] = useState(null);
  const [actualRecDate, setActualRecDate] = useState('');
  const [actualRecPrice, setActualRecPrice] = useState(0);
  const [confirmBank, setConfirmBank] = useState('永豐 大戶DAWHO');

  const [editingTx, setEditingTx] = useState(null);
  const [editingCard, setEditingCard] = useState(null);
  const [editingBank, setEditingBank] = useState(null);
  const [editingMemo, setEditingMemo] = useState(null);
  const [editingRecord, setEditingRecord] = useState(null);
  const [editingStock, setEditingStock] = useState(null);
  const [activeMemoId, setActiveMemoId] = useState(null);
  const [cardSortBy, setCardSortBy] = useState('default');
  const [billingCycleOffset, setBillingCycleOffset] = useState(0);
  const [exportStartDate, setExportStartDate] = useState(format(subMonths(new Date(), 1), 'yyyy-MM-dd'));
  const [exportEndDate, setExportEndDate] = useState(format(new Date(), 'yyyy-MM-dd'));

  // --- Helpers ---
  const generateId = () => Math.random().toString(36).substr(2, 9);

  // --- Accounting Logic ---
  const currentMonthTxs = useMemo(() => {
    return transactions.filter(tx => {
      if (!tx || !tx.date) return false;
      const parsed = parseISO(tx.date);
      return isValid(parsed) && isSameMonth(parsed, currentDate);
    });
  }, [transactions, currentDate]);

  const defaultProjectName = useMemo(() => {
    return projects.find(p => p.id === 'default')?.name || '日常支出';
  }, [projects]);

  const filteredAccountingTxs = useMemo(() => {
    return currentMonthTxs.filter(tx => {
      if (accountingProjectFilter === '合併總覽') {
        const proj = projects.find(p => p.name === (tx.projectName || defaultProjectName));
        return proj?.status === 'Active';
      }
      return (tx.projectName || defaultProjectName) === accountingProjectFilter;
    });
  }, [currentMonthTxs, accountingProjectFilter, projects, defaultProjectName]);

  const { totalExpense, totalIncome } = useMemo(() => {
    return filteredAccountingTxs.reduce(
      (acc, tx) => {
        const val = tx.convertedAmount || tx.amount;
        if (tx.type === 'expense') acc.totalExpense += val;
        else acc.totalIncome += val;
        return acc;
      },
      { totalExpense: 0, totalIncome: 0 }
    );
  }, [filteredAccountingTxs]);

  const pieData = [
    { name: '支出', value: totalExpense, color: '#F28B82' },
    { name: '收入', value: totalIncome, color: '#81C995' },
  ].filter(d => d.value > 0);

  const remainingBudget = budget - totalExpense;

  const expenseByCategory = useMemo(() => {
    return filteredAccountingTxs.filter(tx => tx.type === 'expense').reduce((acc, tx) => {
      acc[tx.category] = (acc[tx.category] || 0) + (tx.convertedAmount || tx.amount);
      return acc;
    }, {});
  }, [filteredAccountingTxs]);

  const innerPieData = useMemo(() => {
    return Object.entries(expenseByCategory).map(([name, value], index) => {
      const colors = ['#5C7FB0', '#81C995', '#F6C28B', '#AEC6CF', '#D4A5A5', '#B19CD9', '#FFB7B2', '#E2F0CB'];
      return { name, value, color: colors[index % colors.length] };
    });
  }, [expenseByCategory]);

  const outerPieData = useMemo(() => {
    return filteredAccountingTxs
      .filter(tx => tx.type === 'expense' && (!activePieCategory || tx.category === activePieCategory))
      .reduce((acc, tx) => {
        const val = tx.convertedAmount || tx.amount;
        const existing = acc.find(item => item.name === tx.title);
        if (existing) existing.value += val;
        else acc.push({ name: tx.title, value: val, category: tx.category });
        return acc;
      }, [])
      .map((item: any, index: number) => {
        const colors = ['#5C7FB0', '#81C995', '#F6C28B', '#AEC6CF', '#D4A5A5', '#B19CD9', '#FFB7B2', '#E2F0CB'];
        return { ...item, color: colors[(index + 2) % colors.length] };
      });
  }, [filteredAccountingTxs, activePieCategory]);

  const paymentMethodData = useMemo(() => {
    return filteredAccountingTxs.filter(tx => tx.type === 'expense').reduce((acc, tx) => {
      const pm = tx.paymentMethod || '未分類';
      const val = tx.convertedAmount || tx.amount;
      const existing = acc.find(item => item.name === pm);
      if (existing) existing.value += val;
      else acc.push({ name: pm, value: val, color: '' });
      return acc;
    }, []).map((item: any, index: number) => {
      const colors = ['#5C7FB0', '#81C995', '#F6C28B', '#AEC6CF', '#D4A5A5'];
      return { ...item, color: colors[index % colors.length] };
    });
  }, [filteredAccountingTxs]);

  const totalExpenseForPM = paymentMethodData.reduce((sum: number, item: any) => sum + item.value, 0);
  const cashData = paymentMethodData.find((item: any) => item.name === '現金');
  const cashRatio = cashData && totalExpenseForPM > 0 ? (cashData.value / totalExpenseForPM) * 100 : 0;

  const lastMonth = subMonths(currentDate, 1);
  const lastMonthTxs = useMemo(() => {
    return transactions.filter(tx => {
      if (!tx || !tx.date) return false;
      const parsed = parseISO(tx.date);
      return isValid(parsed) && isSameMonth(parsed, lastMonth) && tx.type === 'expense';
    });
  }, [transactions, lastMonth]);

  const lastMonthByCategory = useMemo(() => {
    return lastMonthTxs.reduce((acc, tx) => {
      acc[tx.category] = (acc[tx.category] || 0) + (tx.convertedAmount || tx.amount);
      return acc;
    }, {});
  }, [lastMonthTxs]);

  const trendData = useMemo(() => {
    return categories.map(cat => ({
      name: cat,
      '本月': expenseByCategory[cat] || 0,
      '上月': lastMonthByCategory[cat] || 0,
      isWarning: (expenseByCategory[cat] || 0) > (lastMonthByCategory[cat] || 0)
    })).filter(item => item['本月'] > 0 || item['上月'] > 0);
  }, [categories, expenseByCategory, lastMonthByCategory]);

  const sortedCards = useMemo(() => {
    let sorted = [...cards];
    if (cardSortBy === 'bank') {
      sorted.sort((a, b) => a.bank.localeCompare(b.bank));
    } else if (cardSortBy === 'cashbackRate') {
      sorted.sort((a, b) => b.cashbackRate - a.cashbackRate);
    } else if (cardSortBy === 'billingDate') {
      const getDay = (dateStr?: string) => {
        if (!dateStr) return 99;
        const match = dateStr.match(/\d+/);
        return match ? parseInt(match[0], 10) : 99;
      };
      sorted.sort((a, b) => getDay(a.billingDate) - getDay(b.billingDate));
    } else if (cardSortBy === 'sortOrder') {
      sorted.sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
    }
    return sorted;
  }, [cards, cardSortBy]);

  const manualPaymentCards = useMemo(() => {
    const today = new Date().getDate();
    if (today >= 17 && today <= 20) {
      return cards.filter(c => c.paymentMethod?.includes('手動扣款'));
    }
    return [];
  }, [cards]);

  // Yearly/Quarterly Chart Data
  const monthlyData = useMemo(() => {
    const data = [];
    for (let i = 5; i >= 0; i--) {
      const d = subMonths(new Date(), i);
      const monthTxs = transactions.filter(tx => {
        if (!tx || !tx.date) return false;
        const parsed = parseISO(tx.date);
        return isValid(parsed) && isSameMonth(parsed, d);
      });
      const expense = monthTxs.filter(tx => tx.type === 'expense').reduce((sum, tx) => sum + (tx.convertedAmount || tx.amount), 0);
      const income = monthTxs.filter(tx => tx.type === 'income').reduce((sum, tx) => sum + (tx.convertedAmount || tx.amount), 0);
      data.push({
        name: format(d, 'MM月'),
        支出: expense,
        收入: income
      });
    }
    return data;
  }, [transactions]);

  const pendingRecurring = useMemo(() => {
    const pending: { stock: Stock; setting: RecurringSetting; date: string }[] = [];
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth();

    stocks.forEach(stock => {
      if (stock.recurringSettings && stock.recurringSettings.length > 0) {
        stock.recurringSettings.forEach(setting => {
          const start = parseISO(setting.startDate);
          
          // 計算首筆扣款日
          let firstDeductionDate = new Date(start.getFullYear(), start.getMonth(), setting.day);
          if (start.getDate() > setting.day) {
            firstDeductionDate = addMonths(firstDeductionDate, 1);
          }

          // 如果現在時間還沒到首筆扣款日，就不顯示待確認
          if (now < firstDeductionDate) {
            return;
          }

          // 計算當月的扣款日
          const currentDeductionDate = new Date(currentYear, currentMonth, setting.day);
          
          // 如果當月扣款日還沒到，或者當月扣款日早於首筆扣款日，則檢查上個月
          let targetDate = currentDeductionDate;
          if (now.getDate() < setting.day || currentDeductionDate < firstDeductionDate) {
            targetDate = addMonths(currentDeductionDate, -1);
          }

          // 如果目標扣款日 >= 首筆扣款日，且 <= 現在時間
          if (targetDate >= firstDeductionDate && targetDate <= now) {
            const targetDateStr = format(targetDate, 'yyyy-MM-dd');
            const exists = stock.transactions.some(tx => 
              tx.type === 'recurring' && 
              tx.date.startsWith(format(targetDate, 'yyyy-MM')) &&
              tx.originalDay === setting.day
            );
            
            if (!exists) {
              pending.push({ stock, setting, date: targetDateStr });
            }
          }
        });
      }
    });
    return pending;
  }, [stocks]);

  // --- Stock Update Logic ---
  const updateStockPrices = async () => {
    if (stocks.length === 0) return;
    setIsUpdatingStocks(true);
    try {
      const ai = new window.GoogleGenAI({ apiKey: geminiKey });
      const stockList = stocks.map(s => `${s.name} (${s.code})`).join(', ');
      
      const response = await ai.models.generateContent({
        model: "gemini-3-flash-preview",
        contents: `請幫我查詢以下股票在台灣股市的最新收盤價（以 TWD 為單位）：${stockList}。
        請以 JSON 格式回傳，格式如下：
        [
          {"code": "股票代碼", "price": 數字}
        ]`,
        config: {
          tools: [{ googleSearch: {} }],
          responseMimeType: "application/json",
          responseSchema: {
            type: window.Type.ARRAY,
            items: {
              type: window.Type.OBJECT,
              properties: {
                code: { type: window.Type.STRING },
                price: { type: window.Type.NUMBER }
              },
              required: ["code", "price"]
            }
          }
        }
      });

      const updatedData = JSON.parse(response.text);
      
      setStocks(prevStocks => prevStocks.map(stock => {
        const update = updatedData.find((d: any) => d.code === stock.code);
        if (update) {
          const newPrice = update.price;
          return {
            ...stock,
            latestPrice: newPrice,
            lastUpdated: format(new Date(), 'yyyy-MM-dd')
          };
        }
        return stock;
      }));
    } catch (error) {
      console.error("Failed to update stock prices:", error);
    } finally {
      setIsUpdatingStocks(false);
    }
  };

  const clearAllData = () => {
    localStorage.clear();
    window.location.reload();
  };

  const exportAllDataJSON = () => {
    const data = {
      transactions: JSON.parse(localStorage.getItem('transactions') || '[]'),
      cards: JSON.parse(localStorage.getItem('cards') || '[]'),
      banks: JSON.parse(localStorage.getItem('banks') || '[]'),
      memos: JSON.parse(localStorage.getItem('memos') || '[]'),
      stocks: JSON.parse(localStorage.getItem('stocks') || '[]'),
      projects: JSON.parse(localStorage.getItem('projects') || '[]')
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_${format(new Date(), 'yyyyMMdd')}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const exportTransactionsXLSX = () => {
    const txs = JSON.parse(localStorage.getItem('transactions') || '[]');
    const exportData = txs.map((tx: any) => ({
      '日期': tx.date,
      '類型': tx.type === 'expense' ? '支出' : '收入',
      '標題': tx.title,
      '金額': tx.amount,
      '類別': tx.category,
      '支付方式': tx.paymentMethod,
      '專案': tx.projectName || '',
      '備註': tx.notes || ''
    }));
    const worksheet = XLSX.utils.json_to_sheet(exportData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "收支紀錄");
    XLSX.writeFile(workbook, `收支紀錄_${format(new Date(), 'yyyyMMdd')}.xlsx`);
  };

  const clearAllTransactions = () => {
    setTransactions([]);
    setIsConfirmClearModalOpen(false);
  };


  // --- Render Functions ---
  const renderAccounting = () => (
    <div className="flex-1 overflow-y-auto no-scrollbar pb-32">
      {/* Header & Date Selector */}
      <div className="px-6 pt-10 pb-6 bg-[#5C7FB0] text-white rounded-b-[2.5rem] shadow-md z-10">
        <div className="flex justify-between items-center mb-6">
          <div className="flex items-center gap-1 -ml-2">
            <button onClick={() => setCurrentDate(subMonths(currentDate, 1))} className="p-2 hover:bg-white/20 rounded-full transition-colors">
              <ChevronLeft size={24} />
            </button>
            
            <button 
              onClick={() => {
                setPickerYear(currentDate.getFullYear());
                setIsMonthPickerOpen(true);
              }}
              className="relative flex items-center justify-center cursor-pointer group px-4 py-1.5 bg-[#4A6B9C] hover:bg-[#3A5B8C] rounded-full shadow-sm transition-colors active:scale-95"
            >
              <h1 className="text-xl font-black tracking-wider text-white flex items-center gap-2" style={{ fontFamily: '"Zen Maru Gothic", sans-serif' }}>
                {format(currentDate, 'yyyy年 MM月')}
                <Calendar size={18} className="text-white/80" />
              </h1>
            </button>

            <button onClick={() => setCurrentDate(addMonths(currentDate, 1))} className="p-2 hover:bg-white/20 rounded-full transition-colors">
              <ChevronRight size={24} />
            </button>
          </div>
          <button onClick={() => setIsSettingsModalOpen(true)} className="p-2 hover:bg-white/20 rounded-full transition-colors"><Settings size={24} /></button>
        </div>

        <div className="flex gap-3 mb-6">
          <button 
            onClick={() => { setEditingTx(null); setIsTxModalOpen(true); }}
            className="flex-1 bg-white text-[#5C7FB0] py-3 rounded-2xl font-bold shadow-sm flex items-center justify-center gap-2 hover:bg-white/90 transition-colors active:scale-95"
          >
            <Plus size={20} /> 新增支出 / 收入
          </button>
          <button 
            onClick={() => setIsProjectModalOpen(true)}
            className="px-4 bg-white/20 text-white py-3 rounded-2xl font-bold shadow-sm flex items-center justify-center gap-2 hover:bg-white/30 transition-colors active:scale-95 border border-white/30"
            title="專案管理"
          >
            <Globe size={20} />
          </button>
          <button 
            onClick={() => setIsConfirmClearModalOpen(true)}
            className="px-4 bg-white/20 text-white py-3 rounded-2xl font-bold shadow-sm flex items-center justify-center gap-2 hover:bg-white/30 transition-colors active:scale-95 border border-white/30"
            title="清除所有紀錄"
          >
            <Trash2 size={20} />
          </button>
        </div>
        
        <div className="mb-4">
          <select
            value={accountingProjectFilter}
            onChange={(e) => setAccountingProjectFilter(e.target.value)}
            className="w-full bg-white/20 text-white border border-white/30 rounded-2xl px-4 py-2 outline-none focus:ring-2 focus:ring-white/50 appearance-none"
          >
            <option value={defaultProjectName} className="text-gray-800">{defaultProjectName}</option>
            {projects.filter(p => p.status === 'Active' && p.name !== defaultProjectName).map(p => (
              <option key={p.id} value={p.name} className="text-gray-800">{p.name}</option>
            ))}
            <option value="合併總覽" className="text-gray-800">合併總覽</option>
          </select>
        </div>

        <div className="bg-white/10 backdrop-blur-md rounded-3xl p-6 border border-white/20 shadow-inner">
          <div className="flex justify-between items-center mb-4">
            <div>
              <p className="text-white/80 text-sm font-medium mb-1">本月結餘</p>
              <div className="text-3xl font-bold tracking-tight">$ {(totalIncome - totalExpense).toLocaleString()}</div>
            </div>
          </div>
          
          <div className="h-56 w-full mb-4 relative">
            {innerPieData.length > 0 ? (
              <>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie 
                      data={innerPieData} 
                      innerRadius={45} 
                      outerRadius={65} 
                      paddingAngle={2} 
                      dataKey="value"
                      onClick={(data) => setActivePieCategory(activePieCategory === data.name ? null : data.name)}
                      style={{ cursor: 'pointer', filter: 'drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.1))' }}
                      label={({ cx, cy, midAngle, innerRadius, outerRadius, value, name, percent }) => {
                        const RADIAN = Math.PI / 180;
                        const radius = innerRadius + (outerRadius - innerRadius) * 0.5;
                        const x = cx + radius * Math.cos(-midAngle * RADIAN);
                        const y = cy + radius * Math.sin(-midAngle * RADIAN);
                        return (
                          <text 
                            x={x} 
                            y={y} 
                            fill="white" 
                            textAnchor="middle" 
                            dominantBaseline="central" 
                            className="text-[10px] font-bold"
                            style={{ pointerEvents: 'none', textShadow: '0px 1px 2px rgba(0,0,0,0.3)' }}
                          >
                            {`${name} ${(percent * 100).toFixed(0)}%`}
                          </text>
                        );
                      }}
                      labelLine={false}
                    >
                      {innerPieData.map((entry, index) => (
                        <Cell key={`inner-${index}`} fill={entry.color} opacity={activePieCategory && activePieCategory !== entry.name ? 0.3 : 1} />
                      ))}
                    </Pie>
                    <Pie 
                      data={outerPieData} 
                      innerRadius={75} 
                      outerRadius={90} 
                      paddingAngle={2} 
                      dataKey="value"
                      style={{ filter: 'drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.05))' }}
                    >
                      {outerPieData.map((entry, index) => (
                        <Cell key={`outer-${index}`} fill={entry.color} opacity={0.8} />
                      ))}
                    </Pie>
                    <RechartsTooltip formatter={(value: number) => `$ ${value.toLocaleString()}`} />
                  </PieChart>
                </ResponsiveContainer>
                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                  <span className="text-white/70 text-[10px] mb-0.5">剩餘預算</span>
                  <span className="text-white font-bold text-sm">$ {remainingBudget.toLocaleString()}</span>
                </div>
              </>
            ) : (
              <div className="h-full flex items-center justify-center text-white/50 text-sm">尚無支出資料</div>
            )}
          </div>
          
          <div className="flex justify-between items-center">
            <div>
              <p className="text-white/70 text-xs mb-1">總支出</p>
              <p className="text-lg font-semibold text-[#F28B82]">$ {totalExpense.toLocaleString()}</p>
            </div>
            <div className="text-right">
              <p className="text-white/70 text-xs mb-1">總收入</p>
              <p className="text-lg font-semibold text-[#81C995]">$ {totalIncome.toLocaleString()}</p>
            </div>
          </div>
        </div>
      </div>

      <div className="px-6 pt-6 space-y-6">
        {/* Payment Method Analysis */}
        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <h2 className="text-lg font-bold text-gray-800 mb-4">支付方式分析</h2>
          <div className="h-40 w-full mb-4">
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={paymentMethodData} innerRadius={40} outerRadius={60} paddingAngle={2} dataKey="value">
                  {paymentMethodData.map((entry, index) => (
                    <Cell key={`cell-${index}`} fill={entry.color} />
                  ))}
                </Pie>
                <RechartsTooltip formatter={(value: number) => `$ ${value.toLocaleString()}`} />
                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px' }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          {cashRatio > 30 && (
            <div className="p-3 bg-blue-50 rounded-2xl flex items-start gap-2 text-blue-700 text-xs shadow-sm">
              <AlertCircle size={16} className="shrink-0 mt-0.5" />
              <p>本月現金支出佔 {cashRatio.toFixed(1)}%，建議多使用信用卡以賺取更多回饋。</p>
            </div>
          )}
        </div>

        {/* Trend Comparison */}
        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <h2 className="text-lg font-bold text-gray-800 mb-4">趨勢對比 (本月 vs 上月)</h2>
          <div className="h-64 w-full">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={trendData} layout="vertical" margin={{ top: 0, right: 10, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#f0f0f0" />
                <XAxis type="number" hide />
                <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: '#6b7280' }} width={40} />
                <RechartsTooltip 
                  cursor={{ fill: '#f3f4f6' }}
                  contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                />
                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px' }} />
                <Bar dataKey="本月" fill="#5C7FB0" radius={[0, 4, 4, 0]} barSize={12} />
                <Bar dataKey="上月" fill="#AEC6CF" radius={[0, 4, 4, 0]} barSize={12} />
              </BarChart>
            </ResponsiveContainer>
          </div>
          {trendData.some(d => d.isWarning) && (
            <div className="mt-4 p-3 bg-red-50 rounded-2xl flex items-start gap-2 text-red-600 text-xs shadow-sm">
              <AlertCircle size={16} className="shrink-0 mt-0.5" />
              <p>注意：{trendData.filter(d => d.isWarning).map(d => d.name).join('、')} 支出已超過上月總和！</p>
            </div>
          )}
        </div>

        {/* Transaction List */}
        <div>
          <h2 className="text-lg font-bold text-gray-800 mb-4">紀錄清單</h2>
          <div className="space-y-4">
            {filteredAccountingTxs.length === 0 && <p className="text-center text-gray-400 py-8">本月尚無紀錄</p>}
            {filteredAccountingTxs.map((tx) => (
              <div key={tx.id} onClick={() => { setEditingTx(tx); setIsTxModalOpen(true); }} className="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between cursor-pointer hover:shadow-md transition-all active:scale-95">
                <div className="flex items-center gap-4">
                  <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${getCategoryColor(tx.category, tx.type)}`}>
                    <span className="text-xs font-bold">{tx.category}</span>
                  </div>
                  <div>
                    <h3 className="font-bold text-gray-800 text-base">{tx.title}</h3>
                    <p className="text-xs text-gray-400 mt-0.5">{tx.date} · {tx.paymentMethod}{tx.bank ? ` (${tx.bank})` : ''}</p>
                  </div>
                </div>
                <div className={`font-bold text-lg ${tx.type === 'expense' ? 'text-gray-800' : 'text-green-600'}`}>
                  {tx.type === 'expense' ? '-' : '+'}{tx.amount.toLocaleString()}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  const renderCreditCards = () => {
    const parseLimit = (limitStr: string | undefined) => {
      if (!limitStr) return 0;
      const match = limitStr.match(/[\d,]+/);
      if (!match) return 0;
      return parseInt(match[0].replace(/,/g, ''), 10);
    };

    const calculateBillingCycle = (billingDayStr: string | undefined, offsetMonths: number) => {
      const today = new Date();
      if (!billingDayStr) {
        const targetDate = addMonths(today, offsetMonths);
        return { start: startOfMonth(targetDate), end: endOfMonth(targetDate) };
      }
      const match = billingDayStr.match(/\d+/);
      if (!match) {
        const targetDate = addMonths(today, offsetMonths);
        return { start: startOfMonth(targetDate), end: endOfMonth(targetDate) };
      }
      
      const billingDay = parseInt(match[0], 10);
      const currentYear = today.getFullYear();
      let currentMonth = today.getMonth(); // 0-11
      const currentDay = today.getDate();

      let startMonth = currentMonth;
      let startYear = currentYear;
      let endMonth = currentMonth;
      let endYear = currentYear;

      if (currentDay <= billingDay) {
        startMonth = currentMonth - 1;
      } else {
        endMonth = currentMonth + 1;
      }

      // Apply offset
      startMonth += offsetMonths;
      endMonth += offsetMonths;

      // Normalize months
      while (startMonth < 0) { startMonth += 12; startYear--; }
      while (startMonth > 11) { startMonth -= 12; startYear++; }
      while (endMonth < 0) { endMonth += 12; endYear--; }
      while (endMonth > 11) { endMonth -= 12; endYear++; }

      const getValidDate = (year: number, month: number, day: number) => {
        const lastDayOfMonth = new Date(year, month + 1, 0).getDate();
        return new Date(year, month, Math.min(day, lastDayOfMonth));
      };

      const start = getValidDate(startYear, startMonth, billingDay);
      start.setDate(start.getDate() + 1); // billingDay + 1
      start.setHours(0, 0, 0, 0);

      const end = getValidDate(endYear, endMonth, billingDay);
      end.setHours(23, 59, 59, 999);

      return { start, end };
    };

    return (
      <div className="flex-1 px-6 pt-10 pb-32 overflow-y-auto no-scrollbar">
        <div className="flex justify-between items-center mb-6">
          <div className="flex items-center gap-2">
            <button onClick={() => setBillingCycleOffset(prev => prev - 1)} className="p-1 hover:bg-gray-100 rounded-full transition-colors text-gray-600">
              <ChevronLeft size={20} />
            </button>
            <h1 className="text-xl font-bold text-gray-800">{billingCycleOffset === 0 ? '本期帳單' : billingCycleOffset === -1 ? '上一期帳單' : `${Math.abs(billingCycleOffset)} 期前帳單`}</h1>
            <button onClick={() => setBillingCycleOffset(prev => prev + 1)} disabled={billingCycleOffset >= 0} className={`p-1 rounded-full transition-colors ${billingCycleOffset >= 0 ? 'text-gray-300' : 'hover:bg-gray-100 text-gray-600'}`}>
              <ChevronRight size={20} />
            </button>
          </div>
          <select 
            value={cardSortBy} 
            onChange={(e) => setCardSortBy(e.target.value)}
            className="bg-white border border-gray-200 text-gray-700 text-sm font-bold rounded-2xl px-3 py-1.5 outline-none focus:ring-2 focus:ring-[#5C7FB0] shadow-sm"
          >
            <option value="default">預設排序</option>
            <option value="sortOrder">自訂排序</option>
            <option value="billingDate">依繳款日</option>
            <option value="bank">依銀行</option>
            <option value="cashbackRate">依回饋比例</option>
          </select>
        </div>

        {manualPaymentCards.length > 0 && (
          <div className="bg-red-50 border border-red-200 rounded-2xl p-4 mb-6 flex items-start gap-3 shadow-sm">
            <AlertCircle className="text-red-500 shrink-0 mt-0.5" size={20} />
            <div>
              <h3 className="text-red-800 font-bold text-sm">手動繳款提醒</h3>
              <p className="text-red-600 text-xs mt-1 leading-relaxed">
                您有 {manualPaymentCards.length} 張信用卡需要手動繳款 ({manualPaymentCards.map(c => c.name).join('、')})，請留意繳款期限以免產生違約金。
              </p>
            </div>
          </div>
        )}

        <div className="space-y-4">
          {sortedCards.length === 0 && <p className="text-center text-gray-400 py-8">尚未新增信用卡</p>}
          {sortedCards.map(card => {
            const { start, end } = calculateBillingCycle(card.paymentMethod, billingCycleOffset);
            
            const cardTxs = transactions.filter(tx => {
              if (tx.type !== 'expense' || tx.bank !== card.name) return false;
              
              const txProject = projects.find(p => p.name === (tx.projectName || defaultProjectName));
              const isForeignProject = txProject?.location === '國外';
              const effectiveLocation = isForeignProject ? '國外' : tx.location;

              // 專案優先 (Override)
              if (card.showIntl && effectiveLocation === '國外') {
                return true; // 不論日期都必須列入該卡的已刷金額統計
              }

              const txDate = new Date(tx.date);
              return txDate >= start && txDate <= end;
            });

            const currentMonthSpending = cardTxs.reduce((sum, tx) => sum + (tx.convertedAmount || tx.amount), 0);
            
            const currentMonthIntlSpending = cardTxs
              .filter(tx => {
                const txProject = projects.find(p => p.name === (tx.projectName || defaultProjectName));
                const isForeignProject = txProject?.location === '國外';
                return isForeignProject ? true : tx.location === '國外';
              })
              .reduce((sum, tx) => sum + (tx.convertedAmount || tx.amount), 0);

            const currentMonthDomesticSpending = card.showIntl ? currentMonthSpending - currentMonthIntlSpending : currentMonthSpending;

            const progress = card.spendingLimit > 0 ? Math.min((currentMonthSpending / card.spendingLimit) * 100, 100) : 0;
            const estimatedCashback = Math.floor(currentMonthDomesticSpending * (card.cashbackRate / 100));
            
            const intlLimit = parseLimit(card.intlCashbackLimit);
            const intlProgress = intlLimit > 0 ? Math.min((currentMonthIntlSpending / intlLimit) * 100, 100) : 0;
            const estimatedIntlCashback = Math.floor(currentMonthIntlSpending * ((card.intlCashbackRate || 0) / 100));

            const isManual = card.paymentMethod?.includes('手動扣款');

            return (
              <div key={card.id} onClick={() => { setEditingCard(card); setIsCardModalOpen(true); }} className="bg-gradient-to-br from-gray-800 to-gray-900 p-5 rounded-3xl shadow-lg text-white relative overflow-hidden cursor-pointer hover:scale-[1.02] transition-transform">
                <div className="text-gray-400 text-sm font-medium mb-1">{card.bank}</div>
                <div className="text-xl font-bold mb-4">{card.name}</div>
                
                {/* Billing Info */}
                <div className="bg-gray-800/50 rounded-2xl p-3 mb-4 text-xs space-y-1 border border-gray-700">
                  <div className="flex justify-between">
                    <span className="text-gray-400">繳款日</span>
                    <span className="text-gray-200">{card.billingDate || '未設定'}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-gray-400">帳單結帳日</span>
                    <span className={`text-right max-w-[70%] font-bold ${isManual ? 'text-red-400 flex items-center gap-1 justify-end' : 'text-gray-200'}`}>
                      {isManual && <AlertCircle size={14} />}
                      {card.paymentMethod || '未設定'}
                    </span>
                  </div>
                </div>

                {/* Domestic Progress Bar */}
                <div className="bg-gray-700/50 rounded-2xl p-3 mb-4">
                  <div className="flex justify-between text-xs mb-2">
                    <span className="text-gray-300">本期已刷 / 上限</span>
                    <span className="font-bold">$ {currentMonthSpending.toLocaleString()} / {card.spendingLimit.toLocaleString()}</span>
                  </div>
                  <div className="w-full bg-gray-600 rounded-full h-2 mb-2 overflow-hidden">
                    <div className={`h-2 rounded-full ${progress >= 100 ? 'bg-red-500' : progress >= 80 ? 'bg-orange-400' : 'bg-[#81C995]'}`} style={{ width: `${progress}%` }}></div>
                  </div>
                  <div className="flex justify-between text-xs">
                    <span className="text-gray-400">回饋 {card.cashbackRate}%</span>
                    <span className="text-[#81C995] font-bold">預估回饋: $ {estimatedCashback.toLocaleString()}</span>
                  </div>
                  <div className="text-[10px] text-gray-500 mt-2 text-center border-t border-gray-700 pt-2">
                    週期：{format(start, 'MM/dd')} ~ {format(end, 'MM/dd')}
                  </div>
                </div>

                {/* Overseas Project Progress Bar */}
                {card.showIntl && (
                  <div className="bg-sky-900/40 rounded-2xl p-3 border border-sky-800/50 mt-2">
                    <div className="flex items-center gap-2 mb-2">
                      <Globe size={14} className="text-sky-400" />
                      <span className="text-xs font-bold text-sky-200">{card.intlProjectName || '國外專案'}</span>
                    </div>
                    <div className="flex justify-between text-xs mb-2">
                      <span className="text-sky-300">國外已刷 / 上限</span>
                      <span className="font-bold">$ {currentMonthIntlSpending.toLocaleString()} / {intlLimit.toLocaleString()}</span>
                    </div>
                    <div className="w-full bg-sky-900/60 rounded-full h-2 mb-2 overflow-hidden">
                      <div className={`h-2 rounded-full ${intlProgress >= 100 ? 'bg-red-500' : intlProgress >= 80 ? 'bg-orange-400' : 'bg-sky-400'}`} style={{ width: `${intlProgress}%` }}></div>
                    </div>
                    <div className="flex justify-between text-xs">
                      <span className="text-sky-400">回饋 {card.intlCashbackRate}%</span>
                      <span className="text-sky-300 font-bold">預估回饋: $ {estimatedIntlCashback.toLocaleString()}</span>
                    </div>
                    {card.intlNotes && <p className="text-[10px] text-sky-400/70 mt-2 leading-tight">{card.intlNotes}</p>}
                  </div>
                )}
              </div>
            );
        })}
      </div>
    </div>
  );
};

  const renderBanking = () => (
    <div className="flex-1 px-6 pt-10 pb-32 overflow-y-auto no-scrollbar">
      <div className="flex justify-between items-center mb-6">
        <h1 className="text-2xl font-bold text-gray-800">數位銀行</h1>
        <button 
          onClick={() => { setEditingBank(null); setIsBankModalOpen(true); }}
          className="bg-[#5C7FB0] text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm active:scale-95 transition-transform"
        >
          + 新增帳戶
        </button>
      </div>
      <div className="space-y-6">
        {banks.length === 0 && <p className="text-center text-gray-400 py-8">尚未新增網銀帳戶</p>}
        {banks.map(bank => {
          const pocketTotal = bank.pockets ? bank.pockets.reduce((sum, p) => sum + p.balance, 0) : 0;
          const totalBalance = bank.balance + pocketTotal;
          const pocketInterest = bank.pockets ? bank.pockets.reduce((sum, p) => sum + (p.balance * (p.apy / 100)) / 12, 0) : 0;
          const monthlyInterest = ((bank.balance * (bank.apy / 100)) / 12) + pocketInterest;
          const progress = bank.highInterestLimit > 0 ? (totalBalance / bank.highInterestLimit) * 100 : 0;
          const isOverLimit = totalBalance > bank.highInterestLimit;
          const today = new Date().getDate();
          const isPayoutSoon = bank.payoutDay - today === 1;

          return (
            <div key={bank.id} onClick={() => { setEditingBank(bank); setIsBankModalOpen(true); }} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition-shadow">
              <div className="flex justify-between items-center mb-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-[#5C7FB0]/10 text-[#5C7FB0] rounded-full flex items-center justify-center">
                    <Landmark size={20} />
                  </div>
                  <div>
                    <span className="font-bold text-gray-800 text-lg">{bank.bank}</span>
                    <div className="flex items-center gap-2 mt-0.5">
                      <span className="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full">APY {bank.apy}%</span>
                      <span className="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">發息日: {bank.payoutDay}號</span>
                    </div>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-[10px] text-gray-400">預估月利息</div>
                  <div className="text-sm font-bold text-emerald-600">+$ {Math.floor(monthlyInterest).toLocaleString()}</div>
                </div>
              </div>

              {isPayoutSoon && (
                <div className="mb-4 p-2 bg-amber-50 rounded-2xl flex items-center gap-2 text-amber-700 text-[10px] font-bold border border-amber-100">
                  <AlertCircle size={14} />
                  明天預計入帳 $ {Math.floor(monthlyInterest).toLocaleString()} 利息！
                </div>
              )}

              <div className="bg-gray-50 p-4 rounded-2xl mb-4">
                <div className="flex justify-between items-end mb-2">
                  <div>
                    <div className="text-xs text-gray-500 mb-1">儲存額度 (含子帳戶)</div>
                    <div className="text-2xl font-bold text-gray-800">$ {totalBalance.toLocaleString()}</div>
                  </div>
                  <div className="text-right text-[10px] text-gray-400">
                    高利上限: $ {bank.highInterestLimit.toLocaleString()}
                  </div>
                </div>
                
                <div className="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                  <motion.div 
                    initial={{ width: 0 }}
                    animate={{ width: `${Math.min(progress, 100)}%` }}
                    className={`h-full rounded-full ${isOverLimit ? 'bg-orange-400' : 'bg-blue-400'}`}
                  />
                </div>
                {isOverLimit && (
                  <div className="text-[10px] text-orange-500 font-bold mt-1 text-right">
                    已超過高利額度 $ {(totalBalance - bank.highInterestLimit).toLocaleString()}
                  </div>
                )}
              </div>

              {/* Tasks */}
              {bank.tasks.length > 0 && (
                <div className="mb-4">
                  <div className="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-wider">任務達成狀態</div>
                  <div className="flex flex-wrap gap-2">
                    {bank.tasks.map(task => (
                      <div 
                        key={task.id} 
                        onClick={(e) => {
                          e.stopPropagation();
                          const newBanks = banks.map(b => {
                            if (b.id === bank.id) {
                              return {
                                ...b,
                                tasks: b.tasks.map(t => t.id === task.id ? { ...t, isCompleted: !t.isCompleted } : t)
                              };
                            }
                            return b;
                          });
                          setBanks(newBanks);
                        }}
                        className={`px-3 py-1.5 rounded-2xl text-[10px] font-bold flex items-center gap-1.5 transition-colors ${task.isCompleted ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500'}`}
                      >
                        {task.isCompleted ? <CheckCircle2 size={12} /> : <Circle size={12} />}
                        {task.description}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Pockets */}
              {bank.pockets.length > 0 && (
                <div className="pt-4 border-t border-gray-100">
                  <div className="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-wider">口袋帳戶 / 儲值專案</div>
                  <div className="space-y-2">
                    {bank.pockets.map(pocket => (
                      <div key={pocket.id} className="bg-blue-50/50 p-3 rounded-2xl flex justify-between items-center border border-blue-100/50">
                        <div>
                          <div className="text-xs font-bold text-gray-800">{pocket.name}</div>
                          <div className="text-[10px] text-gray-500">{pocket.duration} · 到期日: {pocket.endDate}</div>
                        </div>
                        <div className="text-right">
                          <div className="text-sm font-bold text-blue-600">$ {pocket.balance.toLocaleString()}</div>
                          <div className="text-[10px] font-bold text-blue-400">{pocket.apy}% APY</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  const renderMemos = () => {
    const months = Array.from({ length: 12 }, (_, i) => i + 1);

    const togglePayment = (memoId: string, month: number) => {
      setMemos(memos.map(m => {
        if (m.id === memoId) {
          const newPayments = { ...m.payments };
          newPayments[month] = !newPayments[month];
          return { ...m, payments: newPayments };
        }
        return m;
      }));
    };

    return (
      <div className="flex-1 px-6 pt-10 pb-32 overflow-y-auto no-scrollbar">
        <div className="flex justify-between items-center mb-6">
          <h1 className="text-2xl font-bold text-gray-800">備忘錄</h1>
          <button 
            onClick={() => { setEditingMemo(null); setIsMemoModalOpen(true); }}
            className="bg-[#5C7FB0] text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm active:scale-95 transition-transform"
          >
            + 新增款項
          </button>
        </div>
        <div className="space-y-6">
          {memos.length === 0 && <p className="text-center text-gray-400 py-8">尚無備忘紀錄</p>}
          {memos.map(memo => {
            return (
              <div key={memo.id} className="bg-white p-5 rounded-3xl shadow-sm border border-orange-100">
                <div className="flex justify-between items-start mb-4">
                  <div>
                    <h3 className="font-bold text-lg text-gray-800">{memo.title}</h3>
                    <p className="text-sm text-gray-500 mt-1">對象：<span className="font-semibold text-gray-700">{memo.person}</span></p>
                    <p className="text-xs text-gray-400 mt-1">{memo.type === 'single' ? '日期：' : '起始：'}{memo.startDate}</p>
                  </div>
                  <div className="flex flex-col items-end gap-2">
                    <span className="font-bold text-xl text-orange-500">$ {memo.amount.toLocaleString()}{memo.type !== 'single' ? ' / 月' : ''}</span>
                    <button 
                      onClick={() => { setEditingMemo(memo); setIsMemoModalOpen(true); }}
                      className="p-2 text-gray-400 hover:bg-gray-100 rounded-full transition-colors"
                    >
                      <Edit2 size={18} />
                    </button>
                  </div>
                </div>
                
                {memo.type !== 'single' ? (
                  <div className="mt-4 pt-4 border-t border-gray-100">
                    <h4 className="text-sm font-bold text-gray-700 mb-3">收款進度 (1~12月)</h4>
                    <div className="grid grid-cols-4 gap-2">
                      {months.map(month => {
                        const isPaid = memo.payments[month];
                        const isTargetMonth = memo.type === 'monthly' || (memo.customMonths && memo.customMonths.includes(month));
                        
                        if (!isTargetMonth) return null;

                        return (
                          <button
                            key={month}
                            onClick={() => togglePayment(memo.id, month)}
                            className={`flex flex-col items-center justify-center py-2 rounded-2xl border transition-colors ${isPaid ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                          >
                            <span className={`text-xs mb-1 ${isPaid ? 'text-green-700 font-bold' : 'text-gray-500'}`}>{month}月</span>
                            {isPaid ? <CheckCircle2 size={16} className="text-green-500" /> : <Circle size={16} className="text-gray-300" />}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div className="mt-4 pt-4 border-t border-gray-100 flex justify-between items-center">
                    <h4 className="text-sm font-bold text-gray-700">收款狀態</h4>
                    <button 
                      onClick={() => setMemos(memos.map(m => m.id === memo.id ? { ...m, isSettled: !m.isSettled } : m))}
                      className={`flex items-center gap-2 px-4 py-2 rounded-2xl font-bold text-sm transition-colors ${memo.isSettled ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-600'}`}
                    >
                      {memo.isSettled ? <><CheckCircle2 size={18} /> 已結清</> : <><Circle size={18} /> 未結清</>}
                    </button>
                  </div>
                )}

                <div className="mt-4 pt-4 border-t border-gray-100">
                  <div className="flex justify-between items-center mb-3">
                    <h4 className="text-sm font-bold text-gray-700">收款紀錄</h4>
                    <button onClick={() => { setActiveMemoId(memo.id); setEditingRecord(null); setIsRecordModalOpen(true); }} className="text-xs text-[#5C7FB0] font-bold bg-[#5C7FB0]/10 px-3 py-1.5 rounded-lg active:scale-95 transition-transform">+ 新增紀錄</button>
                  </div>
                  <div className="space-y-2">
                    {memo.records?.map(record => (
                      <div key={record.id} onClick={() => { setActiveMemoId(memo.id); setEditingRecord(record); setIsRecordModalOpen(true); }} className="bg-gray-50 p-3 rounded-2xl border border-gray-100 cursor-pointer hover:bg-gray-100 transition-colors">
                        <div className="flex justify-between items-start mb-1">
                          <span className="font-bold text-sm text-gray-800">{record.title}</span>
                          <span className="font-bold text-sm text-[#81C995]">$ {record.amount.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between items-center text-xs text-gray-500">
                          <span>{record.date}</span>
                          <span className="truncate ml-2">{record.notes}</span>
                        </div>
                      </div>
                    ))}
                    {(!memo.records || memo.records.length === 0) && <p className="text-xs text-gray-400 text-center py-2">尚無收款紀錄</p>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  const renderStocks = () => {
    const totalValue = Math.floor(stocks.reduce((sum, s) => {
      const price = s.latestPrice || 0;
      return sum + (s.shares * price);
    }, 0));
    const totalPrincipal = stocks.reduce((sum, s) => sum + s.historicalCost, 0);
    const totalProfit = totalValue - totalPrincipal;
    const profitRate = totalPrincipal > 0 ? (totalProfit / totalPrincipal) * 100 : 0;

    const handleExportStocks = () => {
      const start = parseISO(exportStartDate);
      const end = parseISO(exportEndDate);
      
      const exportData: any[] = [];

      stocks.forEach(stock => {
        stock.transactions.forEach(tx => {
          const txDate = parseISO(tx.date);
          if (txDate >= start && txDate <= end) {
            exportData.push({
              '日期': tx.date,
              '股票名稱': stock.name,
              '代碼': stock.code,
              '類型': tx.type === 'single' ? '單筆買入' : '定期定額',
              '金額': tx.amount,
              '股數': tx.shares,
              '成交價': tx.price || (tx.amount / tx.shares).toFixed(2),
              '備註': tx.type === 'recurring' ? `定期定額扣款 (原定 ${tx.originalDay} 號)` : ''
            });
          }
        });
      });

      if (exportData.length === 0) {
        showAlert("所選區間內無交易紀錄");
        return;
      }

      exportData.sort((a, b) => a['日期'].localeCompare(b['日期']));

      const worksheet = XLSX.utils.json_to_sheet(exportData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "股票交易紀錄");
      XLSX.writeFile(workbook, `股票交易紀錄_${exportStartDate}_${exportEndDate}.xlsx`);
    };

    return (
      <div className="flex-1 px-6 pt-10 pb-32 overflow-y-auto no-scrollbar">
        <div className="flex justify-between items-center mb-6">
          <h1 className="text-2xl font-bold text-gray-800">股票投資</h1>
          <button 
            onClick={updateStockPrices}
            disabled={isUpdatingStocks}
            className={`flex items-center gap-2 px-4 py-2 rounded-2xl text-sm font-bold transition-all ${isUpdatingStocks ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-[#5C7FB0] text-white hover:bg-[#4A6B9C] active:scale-95'}`}
          >
            <RefreshCw size={16} className={isUpdatingStocks ? 'animate-spin' : ''} />
            {isUpdatingStocks ? '更新中...' : '更新現值'}
          </button>
        </div>

        {/* 資產概況卡片 */}
        <div className="bg-gradient-to-br from-[#6B8EAD] to-[#5C7FB0] p-6 rounded-[2rem] shadow-lg text-white mb-8 relative overflow-hidden">
          <div className="absolute -right-4 -top-4 w-24 h-24 bg-white/10 rounded-full blur-2xl" />
          <div className="relative z-10">
            <p className="text-white/80 text-xs font-medium mb-1 uppercase tracking-wider">資產概況概覽</p>
            <div className="text-3xl font-bold mb-4 tracking-tight">$ {totalValue.toLocaleString()}</div>
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white/10 backdrop-blur-md rounded-2xl p-3 border border-white/10">
                <p className="text-white/70 text-[10px] mb-1">預估獲利</p>
                <p className={`text-base font-bold ${totalProfit >= 0 ? 'text-emerald-300' : 'text-red-300'}`}>
                  {totalProfit >= 0 ? '+' : ''}{Math.floor(totalProfit).toLocaleString()}
                </p>
              </div>
              <div className="bg-white/10 backdrop-blur-md rounded-2xl p-3 border border-white/10">
                <p className="text-white/70 text-[10px] mb-1">總報酬率</p>
                <p className={`text-base font-bold ${profitRate >= 0 ? 'text-emerald-300' : 'text-red-300'}`}>
                  {profitRate >= 0 ? '+' : ''}{profitRate.toFixed(2)}%
                </p>
              </div>
            </div>
          </div>
        </div>

        {/* 定期定額待確認區 */}
        {pendingRecurring.length > 0 && (
          <div className="mb-8 space-y-4">
            <h2 className="text-sm font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
              <RefreshCw size={16} className="text-orange-500" /> 定期定額待確認
            </h2>
            <div className="space-y-3">
              {pendingRecurring.map((item, idx) => (
                <div 
                  key={`${item.stock.id}-${item.setting.id}-${item.date}`}
                  onClick={() => {
                    setConfirmingRecurring(item);
                    setActualRecDate(item.date);
                    setActualRecPrice(0);
                  }}
                  className="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-orange-400 flex justify-between items-center cursor-pointer hover:shadow-md transition-all active:scale-95"
                >
                  <div>
                    <div className="text-sm font-bold text-gray-800">{item.stock.name} ({item.stock.code})</div>
                    <div className="text-xs text-gray-500 mt-1">預計扣款日: {item.date.replace(/-/g, '/')}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-sm font-bold text-orange-600">${item.setting.amount.toLocaleString()}</div>
                    <div className="text-[10px] text-gray-400 mt-1">點擊確認</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="space-y-4 mb-8">
          {stocks.length === 0 && <p className="text-center text-gray-400 py-8">尚未新增投資紀錄</p>}
          {stocks.map(stock => {
            const latestPrice = stock.latestPrice || 0;
            const currentValue = stock.shares * latestPrice;
            const principal = stock.historicalCost;
            const profit = currentValue - principal;
            const profitRate = principal > 0 ? (profit / principal) * 100 : 0;

            return (
              <div key={stock.id} onClick={() => { setEditingStock(stock); setIsStockModalOpen(true); }} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition-all active:scale-[0.98]">
                <div className="flex justify-between items-start mb-4">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-2xl flex items-center justify-center bg-blue-50 text-blue-500">
                      <TrendingUp size={20} />
                    </div>
                    <div>
                      <h3 className="font-bold text-gray-800">{stock.name}</h3>
                      <div className="flex items-center gap-2 mt-0.5">
                        <span className="text-[10px] font-bold bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">{stock.code}</span>
                        {stock.recurringSettings && stock.recurringSettings.length > 0 && (
                          <span className="text-[10px] font-bold bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded">
                            定期: {stock.recurringSettings.map(s => s.day).join(', ')}號
                          </span>
                        )}
                      </div>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-[10px] text-gray-400">現值</div>
                    <div className="text-lg font-bold text-gray-800">$ {Math.floor(currentValue).toLocaleString()}</div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3 text-xs">
                  <div className="bg-gray-50 p-3 rounded-2xl">
                    <p className="text-gray-400 mb-1">投入總本金</p>
                    <p className="font-bold text-gray-700">$ {principal.toLocaleString()}</p>
                  </div>
                  <div className="bg-gray-50 p-3 rounded-2xl">
                    <p className="text-gray-400 mb-1">持有總股數</p>
                    <p className="font-bold text-gray-700">{stock.shares.toLocaleString()} 股</p>
                  </div>
                </div>

                <div className="mt-3 flex justify-between items-center px-1">
                  <div className="text-[10px] text-gray-400">獲利: <span className={profit >= 0 ? 'text-emerald-500 font-bold' : 'text-red-500 font-bold'}>{profit >= 0 ? '+' : ''}{Math.floor(profit).toLocaleString()}</span></div>
                  <div className={`text-[10px] font-bold ${profitRate >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                    {profitRate >= 0 ? '+' : ''}{profitRate.toFixed(2)}%
                  </div>
                </div>
                
                <div className="mt-2 pt-2 border-t border-gray-50 flex justify-end">
                  <span className="text-[9px] text-gray-300">最後更新日期: {stock.lastUpdated.replace(/-/g, '/')}</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* 股票匯出功能 */}
        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-4">匯出股票交易報表</h2>
          <div className="flex flex-col gap-4">
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">開始日期</label>
                <input type="date" value={exportStartDate} onChange={e => setExportStartDate(e.target.value)} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">結束日期</label>
                <input type="date" value={exportEndDate} onChange={e => setExportEndDate(e.target.value)} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
            </div>
            <button 
              onClick={handleExportStocks}
              className="w-full py-3.5 bg-[#6B8EAD] text-white rounded-2xl font-bold text-sm shadow-md hover:bg-[#5C7FB0] active:scale-95 transition-all"
            >
              匯出交易紀錄 (XLSX)
            </button>
          </div>
        </div>

        {renderConfirmRecurringModal()}
      </div>
    );
  };

  const renderAssets = () => {
    const totalBankBalance = banks.reduce((sum, b) => {
      const pocketTotal = b.pockets ? b.pockets.reduce((pSum, p) => pSum + p.balance, 0) : 0;
      return sum + b.balance + pocketTotal;
    }, 0);
    const totalStockValue = Math.floor(stocks.reduce((sum, stock) => {
      const latestPrice = stock.latestPrice || 0;
      return sum + (stock.shares * latestPrice);
    }, 0));
    const totalAssets = totalBankBalance + totalStockValue;

    const handleExportExcel = () => {
      const start = parseISO(exportStartDate);
      const end = parseISO(exportEndDate);
      
      const filteredTxs = transactions.filter(tx => {
        const txDate = parseISO(tx.date);
        return txDate >= start && txDate <= end;
      });

      if (filteredTxs.length === 0) {
        showAlert('所選日期區間內無收支紀錄');
        return;
      }

      const exportData = filteredTxs.map(tx => ({
        '專案': tx.projectName || defaultProjectName,
        '日期': tx.date,
        '項目': tx.title,
        '類型': tx.type === 'expense' ? '支出' : '收入',
        '幣別': tx.currency || 'TWD',
        '實際金額': tx.amount,
        '自動換算金額 (TWD)': tx.convertedAmount || tx.amount,
        '支付方式': tx.paymentMethod || '',
        '信用卡': tx.bank || '',
        '地區': tx.location || '國內',
        '備註': tx.notes || ''
      }));

      const worksheet = XLSX.utils.json_to_sheet(exportData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "收支紀錄");
      
      XLSX.writeFile(workbook, `收支紀錄_${exportStartDate}_${exportEndDate}.xlsx`);
    };

    // Estimate bank deductions
    const estimatedDeductions = cards.reduce((acc, card) => {
      const spending = currentMonthTxs
        .filter(tx => tx.type === 'expense' && tx.bank === card.name)
        .reduce((sum, tx) => sum + (tx.convertedAmount || tx.amount), 0);
      
      if (spending > 0) {
        const bankName = card.deductionBank || card.bank;
        if (!acc[bankName]) acc[bankName] = { total: 0, details: [] };
        acc[bankName].total += spending;
        acc[bankName].details.push({ cardName: card.name, billingDate: card.billingDate || '未設定', spending });
      }
      return acc;
    }, {});

    const assetCompositionData = [
      { name: '數位銀行', value: totalBankBalance, color: '#5C7FB0' },
      { name: '股票市值', value: totalStockValue, color: '#81C995' }
    ];

    const bankDistributionData = banks.map((b, index) => {
      const colors = ['#5C7FB0', '#81C995', '#F6C28B', '#AEC6CF', '#D4A5A5'];
      const pocketTotal = b.pockets ? b.pockets.reduce((pSum, p) => pSum + p.balance, 0) : 0;
      const totalBalance = b.balance + pocketTotal;
      return {
        name: b.bank,
        value: totalBalance,
        isOverLimit: totalBalance > 100000,
        color: totalBalance > 100000 ? '#F28B82' : colors[index % colors.length]
      };
    });

    return (
      <div className="flex-1 px-6 pt-10 pb-32 overflow-y-auto no-scrollbar">
        <h1 className="text-2xl font-bold text-gray-800 mb-6">總資產</h1>
        
        <div className="bg-gradient-to-br from-[#5C7FB0] to-[#4A6B9C] p-6 rounded-3xl shadow-lg text-white mb-6">
          <p className="text-white/80 text-sm font-medium mb-1">總資產淨值</p>
          <div className="text-4xl font-bold mb-6 tracking-tight">$ {totalAssets.toLocaleString()}</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-white/10 rounded-2xl p-3">
              <p className="text-white/70 text-xs mb-1">數位銀行</p>
              <p className="text-lg font-bold">$ {totalBankBalance.toLocaleString()}</p>
            </div>
            <div className="bg-white/10 rounded-2xl p-3">
              <p className="text-white/70 text-xs mb-1">股票市值</p>
              <p className="text-lg font-bold">$ {totalStockValue.toLocaleString()}</p>
            </div>
          </div>
        </div>

        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-4">本月預估扣款 ({format(currentDate, 'M')}月)</h2>
          <div className="flex justify-between items-center mb-4">
            <span className="text-gray-500 text-sm">本月總支出</span>
            <span className="font-bold text-[#F28B82] text-lg">$ {totalExpense.toLocaleString()}</span>
          </div>
          {Object.keys(estimatedDeductions).length > 0 ? (
            <div className="space-y-4 border-t border-gray-100 pt-4">
              {Object.entries(estimatedDeductions).map(([bank, data]: [string, any]) => (
                <div key={bank} className="mb-2 last:mb-0">
                  <div className="flex justify-between items-center mb-1.5">
                    <span className="font-bold text-gray-700 text-sm">{bank}</span>
                    <span className="font-bold text-gray-800">$ {data.total.toLocaleString()}</span>
                  </div>
                  <div className="space-y-1.5 pl-3 border-l-2 border-gray-100">
                    {data.details.map((detail: any, idx: number) => (
                      <div key={idx} className="flex justify-between items-center text-xs">
                        <span className="text-gray-500">{detail.cardName} <span className="text-gray-400 ml-1">(繳款日: {detail.billingDate})</span></span>
                        <span className="text-gray-500">$ {detail.spending.toLocaleString()}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <p className="text-center text-gray-400 text-sm py-2">本月尚無信用卡預估扣款</p>
          )}
        </div>

        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-4">近半年收支分析</h2>
          <div className="h-64 w-full">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={monthlyData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: '#9ca3af' }} />
                <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: '#9ca3af' }} />
                <RechartsTooltip 
                  cursor={{ fill: '#f3f4f6' }}
                  contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                />
                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px' }} />
                <Bar dataKey="支出" fill="#F28B82" radius={[4, 4, 0, 0]} maxBarSize={40} />
                <Bar dataKey="收入" fill="#81C995" radius={[4, 4, 0, 0]} maxBarSize={40} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-4">匯出收支報表</h2>
          <div className="flex flex-col gap-4">
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">開始日期</label>
                <input type="date" value={exportStartDate} onChange={e => setExportStartDate(e.target.value)} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">結束日期</label>
                <input type="date" value={exportEndDate} onChange={e => setExportEndDate(e.target.value)} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
            </div>
            <button 
              onClick={handleExportExcel}
              className="w-full py-3.5 bg-[#5C7FB0] text-white rounded-2xl font-bold text-sm shadow-[0_4px_12px_rgba(92,127,176,0.3)] hover:bg-[#4A6B8A] active:scale-95 transition-all"
            >
              匯出 Excel 報表 (XLSX)
            </button>
          </div>
        </div>

        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-6">
          <h2 className="text-lg font-bold text-gray-800 mb-4">資產組成比例</h2>
          <div className="h-48 w-full mb-4">
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={assetCompositionData} innerRadius={50} outerRadius={70} paddingAngle={5} dataKey="value">
                  {assetCompositionData.map((entry, index) => (
                    <Cell key={`cell-${index}`} fill={entry.color} />
                  ))}
                </Pie>
                <RechartsTooltip formatter={(value: number) => `$ ${value.toLocaleString()}`} />
                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px' }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <h2 className="text-lg font-bold text-gray-800 mb-4">各銀行存款佔比</h2>
          <div className="h-48 w-full mb-4">
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={bankDistributionData} innerRadius={40} outerRadius={70} paddingAngle={2} dataKey="value">
                  {bankDistributionData.map((entry, index) => (
                    <Cell key={`cell-${index}`} fill={entry.color} />
                  ))}
                </Pie>
                <RechartsTooltip formatter={(value: number) => `$ ${value.toLocaleString()}`} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          <div className="space-y-2 mt-4">
            {bankDistributionData.map(b => (
              <div key={b.name} className="flex justify-between items-center text-sm">
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full" style={{ backgroundColor: b.color }}></div>
                  <span className="text-gray-700">{b.name}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="font-bold text-gray-800">$ {b.value.toLocaleString()}</span>
                  {b.isOverLimit && <AlertCircle size={14} className="text-[#F28B82]" />}
                </div>
              </div>
            ))}
          </div>
          {bankDistributionData.some(b => b.isOverLimit) && (
            <div className="mt-4 p-3 bg-red-50 rounded-2xl flex items-start gap-2 text-red-600 text-xs">
              <AlertCircle size={16} className="shrink-0 mt-0.5" />
              <p>部分銀行存款已超過 10 萬元，建議確認是否超過高利活存上限，可考慮將資金轉移至其他高利帳戶或進行投資。</p>
            </div>
          )}
        </div>
      </div>
    );
  };

  const exportToCSV = () => {
    const header = ['日期', '項目', '類型', '幣別', '金額', '支付方式', '信用卡', '地區'];
    const rows = transactions.map(tx => [
      tx.date,
      tx.title,
      tx.type === 'expense' ? '支出' : '收入',
      tx.currency || 'TWD',
      tx.amount,
      tx.paymentMethod,
      tx.bank || '',
      tx.location
    ]);

    const csvContent = [
      header.join(','),
      ...rows.map(row => row.join(','))
    ].join('\n');

    // Add BOM for Excel Chinese support
    const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.setAttribute('href', url);
    link.setAttribute('download', `記帳報表_${format(new Date(), 'yyyyMMdd')}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };
  const ProjectModal = () => {
    const [newProjectName, setNewProjectName] = useState('');
    const [newProjectLocation, setNewProjectLocation] = useState('國內');
    const [settlementReport, setSettlementReport] = useState(null);
    const [editingProjectId, setEditingProjectId] = useState(null);
    const [editingProjectName, setEditingProjectName] = useState('');
    const [deletingProjectId, setDeletingProjectId] = useState(null);

    const handleAddProject = () => {
      const trimmedName = newProjectName.trim();
      if (!trimmedName) return;

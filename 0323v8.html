                <input type="number" value={stock.historicalCost} onChange={e => setStock({ ...stock, historicalCost: Number(e.target.value) })} className="w-full bg-white rounded-2xl py-3 px-4 text-lg font-bold text-gray-800 border border-gray-100" />
              </div>
            </div>
            <div className="flex justify-between items-center px-1">
              <span className="text-[10px] text-gray-400">最後更新日期</span>
              <span className="text-xs font-bold text-gray-500">{stock.lastUpdated.replace(/-/g, '/')}</span>
            </div>
          </div>
        </div>

        <div className="flex gap-3 pt-4 sticky bottom-0 bg-white pb-2 border-t border-gray-100 mt-4">
          {editingStock && (
            <button onClick={() => { setStocks(stocks.filter(s => s.id !== stock.id)); setIsStockModalOpen(false); }} className="p-4 bg-red-50 text-red-500 rounded-2xl">
              <Trash2 size={24} />
            </button>
          )}
          <button onClick={save} className="flex-1 py-4 bg-[#5C7FB0] text-white rounded-2xl font-bold text-lg shadow-md active:scale-95">
            儲存股票資訊
          </button>
        </div>
      </CenterModalWrapper>
    );
  };

  // --- Main Layout ---
  return (
    <div className="min-h-screen max-w-md mx-auto bg-[#F4F1ED] relative overflow-hidden flex flex-col font-sans shadow-xl">
      {activeTab === '帳務' && renderAccounting()}
      {activeTab === '信用卡' && renderCreditCards()}
      {activeTab === '網銀' && renderBanking()}
      {activeTab === '備忘錄' && renderMemos()}
      {activeTab === '股票' && renderStocks()}
      {activeTab === '總資產' && renderAssets()}

      {/* Floating Bottom Navigation */}
      <div className="absolute bottom-0 left-0 right-0 p-4 pointer-events-none z-20">
        <div className="bg-white rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.08)] px-4 py-3 flex justify-between items-center pointer-events-auto overflow-x-auto no-scrollbar gap-2">
          <NavButton icon={Wallet} label="帳務" isActive={activeTab === '帳務'} onClick={() => setActiveTab('帳務')} />
          <NavButton icon={CreditCard} label="信用卡" isActive={activeTab === '信用卡'} onClick={() => setActiveTab('信用卡')} />
          <NavButton icon={Landmark} label="網銀" isActive={activeTab === '網銀'} onClick={() => setActiveTab('網銀')} />
          <NavButton icon={NotebookPen} label="備忘錄" isActive={activeTab === '備忘錄'} onClick={() => setActiveTab('備忘錄')} />
          <NavButton icon={TrendingUp} label="股票" isActive={activeTab === '股票'} onClick={() => setActiveTab('股票')} />
          <NavButton icon={PieChartIcon} label="總資產" isActive={activeTab === '總資產'} onClick={() => setActiveTab('總資產')} />
        </div>
      </div>

      {/* Floating Action Button (FAB) */}
      <button 
        onClick={() => {
          if (activeTab === '帳務') { setEditingTx(null); setIsTxModalOpen(true); }
          if (activeTab === '信用卡') { setEditingCard(null); setIsCardModalOpen(true); }
          if (activeTab === '網銀') { setEditingBank(null); setIsBankModalOpen(true); }
          if (activeTab === '備忘錄') { setEditingMemo(null); setIsMemoModalOpen(true); }
          if (activeTab === '股票') { setEditingStock(null); setIsStockModalOpen(true); }
        }}
        className={`absolute bottom-24 right-6 w-14 h-14 bg-[#5C7FB0] text-white rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(92,127,176,0.4)] hover:bg-[#4A6B8A] transition-colors active:scale-95 z-30 ${activeTab === '總資產' || activeTab === '帳務' ? 'hidden' : ''}`}
      >
        <Plus size={32} strokeWidth={2.5} />
      </button>

      {/* Modals */}
      <AnimatePresence>
        {isSettingsModalOpen && (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <motion.div initial={{ scale: 0.95, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.95, y: 20 }} className="bg-white rounded-[2.5rem] w-full max-w-md overflow-hidden shadow-2xl">
              <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><Settings size={24} className="text-[#6B8EAD]" /> 系統設定</h2>
                <button onClick={() => setIsSettingsModalOpen(false)} className="w-8 h-8 bg-white rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 shadow-sm"><X size={20} /></button>
              </div>
              <div className="p-6 space-y-6">
              {/* 👇 從這裡開始加入預算區塊 👇 */}
              <div>
              <label className="block text-sm font-bold text-gray-700 mb-2">每月預算 ($)</label>
              <input type="number" value={budget} onChange={e => setBudget(Number(e.target.value))} className="w-full border border-gray-200 rounded-2xl px-4 py-3 outline-none focus:border-[#6B8EAD] focus:ring-2 focus:ring-[#6B8EAD]/20 transition-all font-mono text-sm" placeholder="30000" />
              <p className="text-xs text-gray-400 mt-2">設定您每月的預算上限，用於計算剩餘預算。</p>
              </div>
              {/* 👆 加入到這裡結束 👆 */}
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">Gemini API Key</label>
                  <input type="password" value={geminiKey} onChange={e => { setGeminiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} className="w-full border border-gray-200 rounded-2xl px-4 py-3 outline-none focus:border-[#6B8EAD] focus:ring-2 focus:ring-[#6B8EAD]/20 transition-all font-mono text-sm" placeholder="AI Studio API Key" />
                  <p className="text-xs text-gray-400 mt-2">用於啟用 AI 語音記帳與股票更新功能，金鑰僅儲存於本地瀏覽器。</p>
                </div>
                <div className="pt-4 border-t border-gray-100 space-y-3">
                  <label className="block text-sm font-bold text-gray-700 mb-2">資料管理</label>
                  <button onClick={exportAllDataJSON} className="w-full flex items-center justify-center gap-2 bg-gray-50 text-gray-700 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-100 transition-colors active:scale-95">
                    <Download size={20} className="text-[#6B8EAD]" /> 匯出備份資料 (JSON)
                  </button>
                  <button onClick={exportTransactionsXLSX} className="w-full flex items-center justify-center gap-2 bg-gray-50 text-gray-700 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-100 transition-colors active:scale-95">
                    <Download size={20} className="text-emerald-500" /> 匯出 Excel 報表 (XLSX)
                  </button>
                  <button onClick={() => setIsConfirmClearAllModalOpen(true)} className="w-full flex items-center justify-center gap-2 bg-red-50 text-red-500 py-3 rounded-2xl font-bold shadow-sm hover:bg-red-100 transition-colors active:scale-95">
                    <Trash2 size={20} /> 清除所有本地資料
                  </button>
                </div>
              </div>
            </motion.div>
          </motion.div>
        )}
      </AnimatePresence>

      <AnimatePresence>
        {isConfirmClearAllModalOpen && (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
            <motion.div initial={{ scale: 0.95, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.95, y: 20 }} className="bg-white rounded-[2.5rem] w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
              <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <AlertCircle size={32} className="text-red-500" />
              </div>
              <h2 className="text-xl font-bold text-gray-800 mb-2">確定要清除所有資料嗎？</h2>
              <p className="text-gray-500 mb-6">此操作將會刪除所有帳務、網銀、信用卡、備忘錄與股票資料，且無法復原。</p>
              <div className="flex gap-3">
                <button onClick={() => setIsConfirmClearAllModalOpen(false)} className="flex-1 py-3 rounded-2xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors">取消</button>
                <button onClick={clearAllData} className="flex-1 py-3 rounded-2xl font-bold text-white bg-red-500 hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">確定清除</button>
              </div>
            </motion.div>
          </motion.div>
        )}
      </AnimatePresence>

      <CenterModalWrapper isOpen={isConfirmClearModalOpen} onClose={() => setIsConfirmClearModalOpen(false)} title="清除所有紀錄">
        <div className="space-y-6">
          <p className="text-gray-700 text-center">確定要清除所有收支紀錄嗎？此動作無法復原。</p>
          <div className="flex gap-3">
            <button 
              onClick={() => setIsConfirmClearModalOpen(false)}
              className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-200 transition-colors active:scale-95"
            >
              取消
            </button>
            <button 
              onClick={clearAllTransactions}
              className="flex-1 bg-red-500 text-white py-3 rounded-2xl font-bold shadow-sm hover:bg-red-600 transition-colors active:scale-95"
            >
              確定清除
            </button>
          </div>
        </div>
      </CenterModalWrapper>

      <CenterModalWrapper isOpen={isMonthPickerOpen} onClose={() => setIsMonthPickerOpen(false)} title="選擇月份">
        <div className="flex flex-col items-center">
          <div className="flex items-center justify-between w-full mb-6 px-2">
            <button onClick={() => setPickerYear(y => y - 1)} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors active:scale-95">
              <ChevronLeft size={24} />
            </button>
            <span className="text-2xl font-black text-gray-600 tracking-wider" style={{ fontFamily: '"Zen Maru Gothic", sans-serif' }}>{pickerYear}年</span>
            <button onClick={() => setPickerYear(y => y + 1)} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors active:scale-95">
              <ChevronRight size={24} />
            </button>
          </div>
          
          <div className="grid grid-cols-3 gap-3 w-full">
            {Array.from({ length: 12 }, (_, i) => {
              const monthDate = new Date(pickerYear, i, 1);
              const isSelected = isSameMonth(monthDate, currentDate);
              return (
                <button
                  key={i}
                  onClick={() => {
                    setCurrentDate(monthDate);
                    setIsMonthPickerOpen(false);
                  }}
                  className={`py-4 rounded-2xl font-bold text-lg transition-colors active:scale-95 ${
                    isSelected 
                      ? 'bg-[#5C7FB0] text-white shadow-md' 
                      : 'bg-gray-50 text-gray-500 hover:bg-gray-100 hover:text-gray-700'
                  }`}
                  style={{ fontFamily: '"Zen Maru Gothic", sans-serif' }}
                >
                  {i + 1}月
                </button>
              );
            })}
          </div>
        </div>
      </CenterModalWrapper>

      <CenterModalWrapper isOpen={isAlertModalOpen} onClose={() => setIsAlertModalOpen(false)} title="提示">
        <div className="space-y-6">
          <p className="text-gray-700 text-center">{alertMessage}</p>
          <button 
            onClick={() => setIsAlertModalOpen(false)}
            className="w-full bg-[#5C7FB0] text-white py-3 rounded-2xl font-bold shadow-sm hover:bg-[#4A6B8A] transition-colors active:scale-95"
          >
            確定
          </button>
        </div>
      </CenterModalWrapper>

      {isTxModalOpen && <TxModal />}
      {isProjectModalOpen && <ProjectModal />}
      {isCardModalOpen && <CardModal />}
      {isBankModalOpen && <BankModal />}
      {isMemoModalOpen && <MemoModal />}
      {isRecordModalOpen && <RecordModal />}
      {isStockModalOpen && <StockModal />}
    </div>
  );
}

// --- Reusable Components ---
function NavButton({ icon: Icon, label, isActive, onClick }: { icon: any, label: string, isActive: boolean, onClick: () => void }) {
  return (
    <button onClick={onClick} className="flex flex-col items-center justify-center gap-1 w-12">
      <Icon size={24} strokeWidth={isActive ? 2.5 : 2} className={`transition-colors ${isActive ? 'text-[#5C7FB0]' : 'text-gray-400'}`} />
      <span className={`text-[10px] font-bold transition-colors ${isActive ? 'text-[#5C7FB0]' : 'text-gray-400'}`}>{label}</span>
    </button>
  );
}

function CenterModalWrapper({ isOpen, onClose, title, children }: { isOpen: boolean, onClose: () => void, title: string, children: React.ReactNode }) {
  return (
    <AnimatePresence>
      {isOpen && (
        <motion.div 
          key="backdrop"
          initial={{ opacity: 0 }} 
          animate={{ opacity: 1 }} 
          exit={{ opacity: 0 }} 
          onClick={onClose} 
          className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60]" 
        />
      )}
      {isOpen && (
        <motion.div 
          key="modal"
          initial={{ opacity: 0, scale: 0.95, y: '-50%', x: '-50%' }} 
          animate={{ opacity: 1, scale: 1, y: '-50%', x: '-50%' }} 
          exit={{ opacity: 0, scale: 0.95, y: '-50%', x: '-50%' }} 
          transition={{ type: 'spring', damping: 25, stiffness: 300 }} 
          className="fixed top-1/2 left-1/2 w-[90%] max-w-sm bg-white rounded-[2rem] p-6 z-[70] shadow-2xl max-h-[85vh] overflow-y-auto no-scrollbar"
        >
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-gray-800">{title}</h2>
            <button onClick={onClose} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200"><X size={20} /></button>
          </div>
          {children}
        </motion.div>
      )}
    </AnimatePresence>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

//🌟 新增：當程式成功啟動後，把轉圈圈的遮罩淡出並隱藏
setTimeout(() => {
    const loader = document.getElementById('loading-screen');
    if (loader) {
        loader.style.opacity = '0';// 先讓畫面變透明 (觸發 CSS 動畫)
        setTimeout(() => {
            loader.style.display = 'none'; // 500 毫秒後徹底移除遮罩
        }, 500);
    }
},500); // 給 React 0.5 秒的時間把畫面畫好

</script>
</body>
</html>

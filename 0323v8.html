      if (projects.some(p => p.name === trimmedName)) {
        showAlert('專案名稱已存在');
        return;
      }
      const newProject: Project = {
        id: Date.now().toString(),
        name: trimmedName,
        status: 'Active',
        currency: newProjectLocation === '國外' ? 'USD' : 'TWD',
        location: newProjectLocation
      };
      setProjects([...projects, newProject]);
      setNewProjectName('');
      setNewProjectLocation('國內');
    };

    const settleProject = (id: string) => {
      const project = projects.find(p => p.id === id);
      if (!project) return;

      // Calculate settlement data
      const projectTxs = transactions.filter(tx => tx.projectName === project.name && tx.type === 'expense');
      const totalExpense = projectTxs.reduce((sum, tx) => sum + (tx.convertedAmount || tx.amount), 0);
      
      const cardUsage = projectTxs.reduce((acc, tx) => {
        if (tx.paymentMethod === '信用卡' && tx.bank) {
          acc[tx.bank] = (acc[tx.bank] || 0) + (tx.convertedAmount || tx.amount);
        }
        return acc;
      }, {});
      
      const topCard = Object.entries(cardUsage).sort((a, b) => b[1] - a[1])[0];

      const foreignTxs = projectTxs.filter(tx => tx.currency !== 'TWD');
      const avgExchangeRate = foreignTxs.length > 0 
        ? foreignTxs.reduce((sum, tx) => sum + ((tx.convertedAmount || tx.amount) / tx.amount), 0) / foreignTxs.length 
        : null;

      setProjects(projects.map(p => p.id === id ? { ...p, status: 'Archived' } : p));
      
      setSettlementReport({
        projectName: project.name,
        totalExpense,
        topCard: topCard ? { name: topCard[0], amount: topCard[1] } : null,
        avgExchangeRate
      });
    };

    const handleDeleteProject = (id: string) => {
      if (id === 'default') return; // Prevent deleting default project
      const projectToDelete = projects.find(p => p.id === id);
      if (projectToDelete) {
        const defaultProjName = projects.find(p => p.id === 'default')?.name || '日常支出';
        setTransactions(transactions.map(tx => 
          tx.projectName === projectToDelete.name ? { ...tx, projectName: defaultProjName } : tx
        ));
      }
      setProjects(projects.filter(p => p.id !== id));
      setDeletingProjectId(null);
    };

    const handleSaveEditProject = (id: string) => {
      const trimmedName = editingProjectName.trim();
      if (!trimmedName) {
        setEditingProjectId(null);
        return;
      }
      
      const projectToEdit = projects.find(p => p.id === id);
      if (projectToEdit && projectToEdit.name !== trimmedName) {
        if (projects.some(p => p.name === trimmedName)) {
          showAlert('專案名稱已存在');
          return;
        }

        const oldName = projectToEdit.name;
        const newName = trimmedName;
        
        // Update transactions
        setTransactions(transactions.map(tx => 
          tx.projectName === oldName ? { ...tx, projectName: newName } : tx
        ));
        
        // Update filter if it was the old name
        if (accountingProjectFilter === oldName) {
          setAccountingProjectFilter(newName);
        }
        
        // Update project
        setProjects(projects.map(p => 
          p.id === id ? { ...p, name: newName } : p
        ));
      }
      
      setEditingProjectId(null);
    };

    return (
      <CenterModalWrapper isOpen={isProjectModalOpen} onClose={() => { setIsProjectModalOpen(false); setSettlementReport(null); setEditingProjectId(null); setDeletingProjectId(null); }} title="專案管理">
        {settlementReport ? (
          <div className="text-center space-y-6 py-4">
            <div className="text-6xl animate-bounce">🎉</div>
            <h3 className="text-2xl font-bold text-gray-800">{settlementReport.projectName} 結算報告</h3>
            <div className="bg-gray-50 p-6 rounded-2xl text-left space-y-4">
              <div className="flex justify-between items-center">
                <span className="text-gray-500">總花費 (TWD)</span>
                <span className="text-xl font-bold text-[#F28B82]">$ {settlementReport.totalExpense.toLocaleString()}</span>
              </div>
              {settlementReport.topCard && (
                <div className="flex justify-between items-center">
                  <span className="text-gray-500">最常刷卡</span>
                  <span className="font-medium text-gray-800">{settlementReport.topCard.name} ($ {settlementReport.topCard.amount.toLocaleString()})</span>
                </div>
              )}
              {settlementReport.avgExchangeRate && (
                <div className="flex justify-between items-center">
                  <span className="text-gray-500">平均匯率</span>
                  <span className="font-medium text-gray-800">{settlementReport.avgExchangeRate.toFixed(4)}</span>
                </div>
              )}
            </div>
            <button 
              onClick={() => setSettlementReport(null)}
              className="w-full bg-[#5C7FB0] text-white py-4 rounded-2xl font-bold shadow-md hover:bg-[#4A6B8A] transition-colors active:scale-95"
            >
              完成
            </button>
          </div>
        ) : (
          <div className="space-y-6">
            <div className="flex flex-col gap-2">
              <div className="flex gap-2">
                <input 
                  type="text" 
                  value={newProjectName} 
                  onChange={e => setNewProjectName(e.target.value)} 
                  placeholder="輸入新專案名稱 (如: 國外旅遊)" 
                  className="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#5C7FB0]"
                />
                <select 
                  value={newProjectLocation}
                  onChange={e => setNewProjectLocation(e.target.value)}
                  className="bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#5C7FB0]"
                >
                  <option value="國內">國內</option>
                  <option value="國外">國外</option>
                </select>
                <button 
                  onClick={handleAddProject}
                  className="bg-[#5C7FB0] text-white px-6 rounded-2xl font-bold shadow-sm hover:bg-[#4A6B8A] transition-colors active:scale-95"
                >
                  新增
                </button>
              </div>
            </div>

            <div className="space-y-3 max-h-[60vh] overflow-y-auto no-scrollbar">
              {projects.map(project => (
                <div key={project.id} className="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm flex flex-col gap-3">
                  {deletingProjectId === project.id ? (
                    <div className="flex flex-col gap-2">
                      <p className="text-sm text-red-500 font-medium">確定要刪除嗎？相關紀錄將歸為「{projects.find(p => p.id === 'default')?.name || '日常支出'}」。</p>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => handleDeleteProject(project.id)}
                          className="flex-1 bg-red-500 text-white py-2 rounded-xl font-bold text-sm"
                        >
                          確定刪除
                        </button>
                        <button 
                          onClick={() => setDeletingProjectId(null)}
                          className="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl font-bold text-sm"
                        >
                          取消
                        </button>
                      </div>
                    </div>
                  ) : editingProjectId === project.id ? (
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        value={editingProjectName} 
                        onChange={e => setEditingProjectName(e.target.value)} 
                        className="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-3 py-2 outline-none focus:ring-2 focus:ring-[#5C7FB0]"
                        autoFocus
                      />
                      <button 
                        onClick={() => handleSaveEditProject(project.id)}
                        className="bg-[#5C7FB0] text-white px-4 rounded-xl font-bold text-sm"
                      >
                        儲存
                      </button>
                      <button 
                        onClick={() => setEditingProjectId(null)}
                        className="bg-gray-100 text-gray-600 px-4 rounded-xl font-bold text-sm"
                      >
                        取消
                      </button>
                    </div>
                  ) : (
                    <div className="flex items-center justify-between">
                      <div>
                        <h4 className="font-bold text-gray-800">{project.name} {project.id === 'default' && <span className="text-[10px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded ml-1 font-normal">預設</span>}</h4>
                        <span className={`text-xs px-2 py-1 rounded-full ${project.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                          {project.status === 'Active' ? '進行中' : '已結案'}
                        </span>
                      </div>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => {
                            setEditingProjectId(project.id);
                            setEditingProjectName(project.name);
                          }}
                          className="p-2 bg-gray-50 text-gray-600 rounded-xl hover:bg-gray-100 transition-colors"
                          title="編輯專案名稱"
                        >
                          <Edit2 size={18} />
                        </button>
                        {project.status === 'Active' && project.id !== 'default' && (
                          <button 
                            onClick={() => settleProject(project.id)}
                            className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-colors"
                            title="結算專案"
                          >
                            <CheckCircle2 size={18} />
                          </button>
                        )}
                        {project.id !== 'default' && (
                          <button 
                            onClick={() => setDeletingProjectId(project.id)}
                            className="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors"
                            title="刪除專案"
                          >
                            <Trash2 size={18} />
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              ))}
              {projects.length === 0 && (
                <p className="text-center text-gray-400 py-8">尚無專案</p>
              )}
            </div>
          </div>
        )}
      </CenterModalWrapper>
    );
  };

  const TxModal = () => {
    const [tx, setTx] = useState(editingTx || { id: '', title: '', amount: 0, convertedAmount: 0, type: 'expense', category: categories[0], date: format(new Date(), 'yyyy-MM-dd'), paymentMethod: '現金', bank: '', location: '國內', currency: 'TWD', notes: '', projectName: defaultProjectName });
    const [suggestions, setSuggestions] = useState([]);
    const [rates, setRates] = useState({ TWD: 1 });
    const [isFetchingRate, setIsFetchingRate] = useState(false);
    
    useEffect(() => {
      const fetchRates = async () => {
        try {
          setIsFetchingRate(true);
          const res = await fetch('https://open.er-api.com/v6/latest/TWD');
          const data = await res.json();
          if (data && data.rates) {
            // API returns rates relative to TWD (e.g., USD: 0.031)
            // We want TWD relative to other (e.g., 1 / 0.031 = 32.2)
            setRates(data.rates);
          }
        } catch (err) {
          console.error("匯率獲取失敗", err);
        } finally {
          setIsFetchingRate(false);
        }
      };
      fetchRates();
    }, []);

    useEffect(() => {
      const selectedProject = projects.find(p => p.name === tx.projectName);
      if (selectedProject) {
        setTx(prev => {
          let updates = {};
          if (selectedProject.location === '國外' && prev.location !== '國外') {
            updates.location = '國外';
          }
          if (selectedProject.currency !== 'TWD' && prev.currency !== selectedProject.currency) {
            updates.currency = selectedProject.currency;
          }
          return Object.keys(updates).length > 0 ? { ...prev, ...updates } : prev;
        });
      }
    }, [tx.projectName, projects]);

    useEffect(() => {
      if (tx.currency === 'TWD') {
        setTx(prev => ({ ...prev, convertedAmount: prev.amount }));
      } else if (rates[tx.currency]) {
        // Amount is in foreign currency. Rate is TWD per 1 Foreign? 
        // No, the API 'latest/TWD' returns: 1 TWD = X Foreign.
        // So 1 Foreign = 1/X TWD.
        const twdAmount = Math.round(tx.amount / rates[tx.currency]);
        setTx(prev => ({ ...prev, convertedAmount: twdAmount }));
      }
    }, [tx.amount, tx.currency, rates]);
    const [newCategory, setNewCategory] = useState('');
    const [isAddingCategory, setIsAddingCategory] = useState(false);
    const [isEditingCategories, setIsEditingCategories] = useState(false);

    const [newPaymentMethod, setNewPaymentMethod] = useState('');
    const [isAddingPaymentMethod, setIsAddingPaymentMethod] = useState(false);
    const [isEditingPaymentMethods, setIsEditingPaymentMethods] = useState(false);

    const [isEditingItems, setIsEditingItems] = useState(false);
    const [newItemName, setNewItemName] = useState('');
    const [newItemCategory, setNewItemCategory] = useState(categories[0]);

    const removeCategory = (catToRemove: string) => {
      const newCategories = categories.filter(c => c !== catToRemove);
      setCategories(newCategories);
      if (tx.category === catToRemove) {
        setTx({ ...tx, category: newCategories[0] || '' });
      }
    };

    const removePaymentMethod = (pmToRemove: string) => {
      const newPMs = paymentMethods.filter(pm => pm !== pmToRemove);
      setPaymentMethods(newPMs);
      if (tx.paymentMethod === pmToRemove) {
        setTx({ ...tx, paymentMethod: newPMs[0] || '現金' });
      }
    };

    const handleTitleChange = (e: React.ChangeEvent<HTMLInputElement>) => {
      const val = e.target.value;
      setTx({ ...tx, title: val });
      if (val.length > 0) {
        const matches = transactions.filter(t => t.title.includes(val)).filter((v, i, a) => a.findIndex(t => t.title === v.title) === i).slice(0, 3);
        setSuggestions(matches);
      } else {
        setSuggestions([]);
      }
    };

    const applySuggestion = (s: Transaction) => {
      setTx({ ...tx, title: s.title, amount: s.amount, category: s.category, type: s.type, paymentMethod: s.paymentMethod, bank: s.bank, notes: s.notes || '' });
      setSuggestions([]);
    };

    const save = () => {
      if (!tx.title || !tx.amount) return;
      let newTxs;
      if (editingTx) {
        newTxs = transactions.map(t => t.id === tx.id ? tx : t);
      } else {
        newTxs = [{ ...tx, id: generateId() }, ...transactions];
      }
      setTransactions(newTxs);
      console.log("帳務資料已儲存", tx);
      setIsTxModalOpen(false);
    };

    const remove = () => {
      setTransactions(transactions.filter(t => t.id !== tx.id));
      setIsTxModalOpen(false);
    };

    const addCategory = () => {
      if (newCategory && !categories.includes(newCategory)) {
        setCategories([...categories, newCategory]);
        setTx({ ...tx, category: newCategory });
        setNewCategory('');
        setIsAddingCategory(false);
      }
    };

    return (
      <CenterModalWrapper isOpen={isTxModalOpen} onClose={() => setIsTxModalOpen(false)} title={editingTx ? "編輯記帳" : "新增記帳"}>
        <div className="space-y-5">
          <div className="flex gap-4">
            <button onClick={() => setTx({ ...tx, type: 'expense' })} className={`flex-1 py-3 rounded-2xl font-bold transition-all ${tx.type === 'expense' ? 'bg-[#5C7FB0] text-white shadow-md' : 'bg-gray-100 text-gray-500'}`}>支出</button>
            <button onClick={() => setTx({ ...tx, type: 'income' })} className={`flex-1 py-3 rounded-2xl font-bold transition-all ${tx.type === 'income' ? 'bg-[#81C995] text-white shadow-md' : 'bg-gray-100 text-gray-500'}`}>收入</button>
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">所屬專案</label>
            <select 
              value={tx.projectName || defaultProjectName} 
              onChange={e => setTx({ ...tx, projectName: e.target.value })} 
              className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] appearance-none"
            >
              {projects.filter(p => p.status === 'Active' || p.name === tx.projectName).map(p => (
                <option key={p.id} value={p.name}>{p.name}</option>
              ))}
            </select>
          </div>

          <div>
            <div className="flex justify-between items-center mb-2 ml-1">
              <label className="block text-sm font-medium text-gray-500">項目名稱</label>
              <button 
                onClick={() => setIsEditingItems(!isEditingItems)} 
                className="text-xs font-bold text-[#5C7FB0] bg-[#5C7FB0]/10 px-3 py-1.5 rounded-lg"
              >
                {isEditingItems ? '完成' : '管理項目'}
              </button>
            </div>
            <div className="relative">
              <input 
                type="text" 
                value={tx.title} 
                onChange={handleTitleChange} 
                placeholder="輸入或選擇項目名稱..." 
                list="item-suggestions"
                className="w-full bg-gray-50 border-none rounded-2xl py-3 px-4 text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all" 
              />
              <datalist id="item-suggestions">
                {Object.keys(itemMap).map(item => (
                  <option key={item} value={item} />
                ))}
              </datalist>
              {isEditingItems && (
                <div className="mt-3 p-4 bg-gray-50 rounded-2xl border border-gray-200 space-y-3">
                  <div className="flex gap-2">
                    <input type="text" value={newItemName} onChange={e => setNewItemName(e.target.value)} placeholder="新項目名稱" className="flex-1 bg-white rounded-xl px-3 py-2 text-sm border border-gray-200" />
                    <button onClick={() => { if(newItemName) { setItemMap({...itemMap, [newItemName]: '一般'}); setNewItemName(''); } }} className="bg-[#5C7FB0] text-white px-3 rounded-xl text-sm font-bold">新增</button>
                  </div>
                  <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-1">
                    {Object.entries(itemMap).map(([name, cat]) => (
                      <div key={name} className="bg-white border border-gray-200 px-3 py-1 rounded-full text-xs flex items-center gap-2 shadow-sm">
                        <span>{name}</span>
                        <button onClick={() => { const newMap = {...itemMap}; delete newMap[name]; setItemMap(newMap); }} className="text-red-400"><X size={12} /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          <div className="flex gap-4">
            <div className="flex-1">
              <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">幣別</label>
              <div className="relative">
                <select 
                  value={tx.currency || 'TWD'} 
                  onChange={e => setTx({ ...tx, currency: e.target.value })}
                  className="w-full bg-gray-50 border-none rounded-2xl py-3 px-4 text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all appearance-none"
                >
                  {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
                {isFetchingRate && <div className="absolute right-8 top-1/2 -translate-y-1/2"><RefreshCw size={14} className="animate-spin text-gray-400" /></div>}
              </div>
            </div>
            <div className="flex-[2]">
              <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">
                {tx.currency === 'TWD' ? '金額' : `實際金額 (${tx.currency})`}
              </label>
              <div className="relative">
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-xl">
                  {tx.currency === 'USD' ? '$' : tx.currency === 'JPY' ? '¥' : tx.currency === 'EUR' ? '€' : '$'}
                </span>
                <input type="number" value={tx.amount || ''} onChange={e => setTx({ ...tx, amount: Number(e.target.value) })} placeholder="0" className="w-full bg-gray-50 border-none rounded-2xl py-3 pl-10 pr-4 text-xl font-bold text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all" />
              </div>
            </div>
          </div>

          {tx.currency !== 'TWD' && (
            <motion.div 
              initial={{ opacity: 0, y: -10 }}
              animate={{ opacity: 1, y: 0 }}
              className="bg-blue-50 p-4 rounded-2xl border border-blue-100"
            >
              <div className="flex justify-between items-center">
                <div className="text-xs font-bold text-blue-600">自動換算金額 (TWD)</div>
                <div className="text-[10px] text-blue-400">參考匯率: 1 {tx.currency} ≈ {(1 / (rates[tx.currency] || 1)).toFixed(4)} TWD</div>
              </div>
              <div className="mt-2 text-2xl font-black text-[#5C7FB0]">
                $ {tx.convertedAmount.toLocaleString()}
              </div>
            </motion.div>
          )}

          <div>
            <div className="flex justify-between items-center mb-2 ml-1">
              <label className="block text-sm font-medium text-gray-500">分類</label>
              <button 
                onClick={() => {
                  setIsEditingCategories(!isEditingCategories);
                  setIsAddingCategory(false);
                }} 
                className="text-xs font-bold text-[#5C7FB0] bg-[#5C7FB0]/10 px-3 py-1.5 rounded-lg active:scale-95 transition-transform"
              >
                {isEditingCategories ? '完成編輯' : '編輯分類'}
              </button>
            </div>
            <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
              {categories.map((cat) => (
                <div key={cat} className="relative flex-shrink-0">
                  <button 
                    onClick={() => { if (!isEditingCategories) setTx({ ...tx, category: cat }); }} 
                    className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-medium text-sm transition-colors ${tx.category === cat && !isEditingCategories ? getCategoryColor(cat, tx.type) + ' shadow-sm' : 'bg-gray-50 text-gray-600 border border-transparent'} ${isEditingCategories ? 'pr-10' : ''}`}
                  >
                    {cat}
                  </button>
                  {isEditingCategories && (
                    <button 
                      onClick={() => removeCategory(cat)}
                      className="absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 bg-red-100 text-red-500 rounded-full flex items-center justify-center hover:bg-red-200"
                    >
                      <X size={12} strokeWidth={3} />
                    </button>
                  )}
                </div>
              ))}
              {!isEditingCategories && (
                <button onClick={() => setIsAddingCategory(true)} className="whitespace-nowrap px-5 py-2.5 rounded-xl font-medium text-sm bg-gray-100 text-gray-500 border border-dashed border-gray-300 hover:bg-gray-200 transition-colors flex-shrink-0">
                  + 新增
                </button>
              )}
            </div>
            {isAddingCategory && !isEditingCategories && (
              <div className="flex gap-2 mt-2">
                <input type="text" value={newCategory} onChange={e => setNewCategory(e.target.value)} placeholder="新分類名稱" className="flex-1 bg-gray-50 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
                <button onClick={addCategory} className="bg-[#5C7FB0] text-white px-4 rounded-xl text-sm font-bold">確認</button>
                <button onClick={() => setIsAddingCategory(false)} className="bg-gray-200 text-gray-600 px-4 rounded-xl text-sm font-bold">取消</button>
              </div>
            )}
          </div>

          <div className="flex gap-4">
            <div className="flex-1">
              <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">日期</label>
              <input type="date" value={tx.date} onChange={e => setTx({ ...tx, date: e.target.value })} className="w-full bg-gray-50 border-none rounded-2xl py-3 px-4 text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all" />
            </div>
            <div className="flex-1">
              <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">地區</label>
              <div className="flex bg-gray-50 rounded-2xl p-1">
                <button 
                  onClick={() => setTx({ ...tx, location: '國內' })}
                  className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${tx.location === '國內' ? 'bg-white text-[#5C7FB0] shadow-sm' : 'text-gray-400'}`}
                >
                  國內
                </button>
                <button 
                  onClick={() => setTx({ ...tx, location: '國外' })}
                  className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${tx.location === '國外' ? 'bg-white text-[#5C7FB0] shadow-sm' : 'text-gray-400'}`}
                >
                  國外
                </button>
              </div>
            </div>
          </div>

          <div className="flex gap-4">
            <div className="flex-1">
              <div className="flex justify-between items-center mb-2">
                <label className="block text-sm font-medium text-gray-500 ml-1">支付方式</label>
                <button onClick={() => setIsEditingPaymentMethods(!isEditingPaymentMethods)} className="text-[#5C7FB0] text-xs font-bold flex items-center gap-1">
                  <Edit2 size={12} /> {isEditingPaymentMethods ? '完成' : '編輯'}
                </button>
              </div>
              
              {isEditingPaymentMethods ? (
                <div className="bg-gray-50 p-3 rounded-2xl border border-gray-200">
                  <div className="flex flex-wrap gap-2 mb-3">
                    {paymentMethods.map(pm => (
                      <div key={pm} className="bg-white border border-gray-200 px-3 py-1.5 rounded-full text-sm flex items-center gap-2 shadow-sm">
                        {pm}
                        <button onClick={() => removePaymentMethod(pm)} className="text-red-400 hover:text-red-600"><X size={14} /></button>
                      </div>
                    ))}
                  </div>
                  {isAddingPaymentMethod ? (
                    <div className="flex gap-2">
                      <input autoFocus type="text" value={newPaymentMethod} onChange={e => setNewPaymentMethod(e.target.value)} placeholder="新支付方式..." className="flex-1 bg-white border border-gray-200 rounded-xl px-3 py-1.5 text-sm outline-none focus:border-[#5C7FB0]" />
                      <button onClick={() => { if(newPaymentMethod) { setPaymentMethods([...paymentMethods, newPaymentMethod]); setNewPaymentMethod(''); setIsAddingPaymentMethod(false); } }} className="bg-[#5C7FB0] text-white px-3 py-1.5 rounded-xl text-sm font-bold">新增</button>
                      <button onClick={() => setIsAddingPaymentMethod(false)} className="bg-gray-200 text-gray-600 px-3 py-1.5 rounded-xl text-sm font-bold">取消</button>
                    </div>
                  ) : (
                    <button onClick={() => setIsAddingPaymentMethod(true)} className="text-[#5C7FB0] text-sm font-bold flex items-center gap-1"><Plus size={16} /> 新增支付方式</button>
                  )}
                </div>
              ) : (
                <div className="relative">
                  <select value={tx.paymentMethod} onChange={e => setTx({ ...tx, paymentMethod: e.target.value, bank: e.target.value === '現金' ? '' : tx.bank })} className="w-full bg-gray-50 border-none rounded-2xl py-3 px-4 text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all appearance-none">
                    {paymentMethods.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                  </select>
                  <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                    <ChevronRight size={20} className="rotate-90" />
                  </div>
                </div>
              )}
            </div>
          </div>

          {tx.paymentMethod !== '現金' && (
            <div>
              <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">銀行 / 信用卡</label>
              <div className="relative">
                <select value={tx.bank} onChange={e => setTx({ ...tx, bank: e.target.value })} className="w-full bg-gray-50 border-none rounded-2xl py-3 px-4 text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all appearance-none">
                  <option value="">請選擇...</option>
                  <optgroup label="網銀帳戶">
                    {banks.map(b => <option key={b.id} value={b.bank}>{b.bank}</option>)}
                  </optgroup>
                  <optgroup label="信用卡">
                    {cards.map(c => <option key={c.id} value={c.name}>{c.bank} - {c.name}</option>)}
                  </optgroup>
                  <option value="其他">其他</option>
                </select>
                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                  <ChevronRight size={20} className="rotate-90" />
                </div>
              </div>
            </div>
          )}

          <div>
            <label className="block text-sm font-medium text-gray-500 mb-2 ml-1">備註</label>
            <textarea 
              value={tx.notes} 
              onChange={e => setTx({ ...tx, notes: e.target.value })} 
              placeholder="輸入備註資訊..." 
              className="w-full bg-gray-50 border-none rounded-2xl py-3 px-4 text-gray-800 focus:ring-2 focus:ring-[#5C7FB0] outline-none transition-all h-20 resize-none"
            />
          </div>

          <div className="sticky bottom-0 bg-white pt-4 pb-2 flex gap-3 mt-6 border-t border-gray-100">
            {editingTx && (
              <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center hover:bg-red-100 transition-colors">
                <Trash2 size={24} />
              </button>
            )}
            <button onClick={save} className="flex-1 py-4 bg-[#5C7FB0] text-white rounded-2xl font-bold text-lg shadow-[0_8px_20px_rgba(92,127,176,0.3)] active:scale-95 transition-transform">
              儲存紀錄
            </button>
          </div>
        </div>
      </CenterModalWrapper>
    );
  };

  const CardModal = () => {
    const [card, setCard] = useState(editingCard || { 
      id: '', bank: '', name: '', expiry: '', spendingLimit: 0, cashbackRate: 0, channels: '', cashbackExpiry: '', notes: '', billingDate: '', paymentMethod: '', deductionBank: '', sortOrder: 99,
      intlProjectName: '', intlDesc: '', intlCashbackRate: 0, intlCashbackLimit: '', intlCashbackExpiry: '', intlThreshold: '', intlNotes: '', showIntl: false
    });
    const save = () => {
      if (!card.bank || !card.name) return;
      let newCards;
      if (editingCard) {
        newCards = cards.map(c => c.id === card.id ? card : c);
      } else {
        newCards = [...cards, { ...card, id: generateId() }];
      }
      setCards(newCards);
      console.log("信用卡資料已儲存", card);
      setIsCardModalOpen(false);
    };
    const remove = () => { setCards(cards.filter(c => c.id !== card.id)); setIsCardModalOpen(false); };

    const isExpired = useMemo(() => {
      if (!card.expiry) return false;
      const [year, month] = card.expiry.split('-').map(Number);
      if (isNaN(year) || isNaN(month)) return false;
      const expiryDate = new Date(year, month - 1, 1);
      return isValid(expiryDate) && isBefore(expiryDate, new Date());
    }, [card.expiry]);

    return (
      <CenterModalWrapper isOpen={isCardModalOpen} onClose={() => setIsCardModalOpen(false)} title={editingCard ? "編輯信用卡" : "新增信用卡"}>
        <div className="space-y-4">
          {isExpired && (
            <div className="bg-red-50 p-4 rounded-2xl flex items-start gap-3 text-red-600 border border-red-100">
              <AlertCircle size={20} className="shrink-0 mt-0.5" />
              <div>
                <p className="font-bold">卡片已到期</p>
                <p className="text-xs">此卡片有效期限已過，請記得更換新卡號並更新資訊。</p>
              </div>
            </div>
          )}
          <div className="bg-gray-50 p-4 rounded-3xl space-y-4">
            <h3 className="text-sm font-bold text-gray-800 flex items-center gap-2">
              <CreditCard size={18} className="text-[#5C7FB0]" /> 基本資訊
            </h3>
            <input type="text" value={card.bank} onChange={e => setCard({ ...card, bank: e.target.value })} placeholder="銀行名稱 (例: 玉山銀行)" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
            <input type="text" value={card.name} onChange={e => setCard({ ...card, name: e.target.value })} placeholder="卡片名稱 (例: UBear卡)" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">有效期限 (YYYY-MM)</label>
                <input type="month" value={card.expiry} onChange={e => setCard({ ...card, expiry: e.target.value })} className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">刷卡上限 ($)</label>
                <input type="number" value={card.spendingLimit || ''} onChange={e => setCard({ ...card, spendingLimit: Number(e.target.value) })} placeholder="10000" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
              </div>
            </div>
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">回饋比例 (%)</label>
                <input type="number" value={card.cashbackRate || ''} onChange={e => setCard({ ...card, cashbackRate: Number(e.target.value) })} placeholder="10" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">回饋有效日期</label>
                <input type="date" value={card.cashbackExpiry} onChange={e => setCard({ ...card, cashbackExpiry: e.target.value })} className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
              </div>
            </div>
            <div>
              <label className="block text-xs text-gray-500 mb-1 ml-1">合作通路</label>
              <input type="text" value={card.channels} onChange={e => setCard({ ...card, channels: e.target.value })} placeholder="Line pay..." className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
            </div>
            <div>
              <label className="block text-xs text-gray-500 mb-1 ml-1">備註</label>
              <input type="text" value={card.notes} onChange={e => setCard({ ...card, notes: e.target.value })} placeholder="主力卡..." className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
            </div>
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">繳款日</label>
                <div className="bg-white rounded-2xl py-3 px-4 border border-gray-100 flex items-center text-gray-700 text-sm">
                  <span>每月</span>
                  <select 
                    value={card.billingDate?.match(/\d+/)?.[0] || ''} 
                    onChange={e => setCard({ ...card, billingDate: e.target.value ? `每月${e.target.value}號繳款` : '' })} 
                    className="mx-1 bg-gray-50 text-[#5C7FB0] font-bold rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-[#5C7FB0] appearance-none text-center cursor-pointer"
                  >
                    <option value="">--</option>
                    {Array.from({length: 31}, (_, i) => i + 1).map(d => (
                      <option key={d} value={d}>{d}</option>
                    ))}
                  </select>
                  <span>號繳款</span>
                </div>
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">自訂排序 (數字小在前)</label>
                <input type="number" value={card.sortOrder || ''} onChange={e => setCard({ ...card, sortOrder: Number(e.target.value) })} placeholder="1" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] border border-gray-100" />
              </div>
            </div>
            <div>
              <label className="block text-xs text-gray-500 mb-1 ml-1">繳款銀行</label>
              <select 
                value={card.deductionBank || ''} 
                onChange={e => setCard({ ...card, deductionBank: e.target.value })} 
                className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] appearance-none border border-gray-100"
              >
                <option value="">請選擇繳款網銀</option>
                {banks.map(b => (
                  <option key={b.id} value={b.bank}>{b.bank}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="block text-xs text-gray-500 mb-1 ml-1">帳單結帳日</label>
              <div className="bg-white rounded-2xl py-3 px-4 border border-gray-100 flex items-center text-gray-700 text-sm w-fit">
                <span>每月</span>
                <select 
                  value={card.paymentMethod?.match(/\d+/)?.[0] || ''} 
                  onChange={e => setCard({ ...card, paymentMethod: e.target.value ? `每月${e.target.value}號出帳` : '' })} 
                  className="mx-1 bg-gray-50 text-[#5C7FB0] font-bold rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-[#5C7FB0] appearance-none text-center cursor-pointer"
                >
                  <option value="">--</option>
                  {Array.from({length: 31}, (_, i) => i + 1).map(d => (
                    <option key={d} value={d}>{d}</option>
                  ))}
                </select>
                <span>號出帳</span>
              </div>
            </div>
          </div>

          <div className="bg-sky-50 p-4 rounded-3xl space-y-4 border border-sky-100">
            <div className="flex justify-between items-center">
              <h3 className="text-sm font-bold text-sky-800 flex items-center gap-2">
                <TrendingUp size={18} className="text-sky-500" /> 專案
              </h3>
              <div className="flex items-center gap-3">
                <button 
                  onClick={() => setCard({
                    ...card,
                    intlProjectName: '', intlDesc: '', intlCashbackRate: 0, intlCashbackLimit: '', intlCashbackExpiry: '', intlThreshold: '', intlNotes: '', showIntl: false
                  })}
                  className="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-md"
                >
                  一鍵清除專案資訊
                </button>
                <label className="flex items-center gap-2 cursor-pointer">
                  <input 
                    type="checkbox" 
                    checked={card.showIntl || false} 
                    onChange={e => setCard({ ...card, showIntl: e.target.checked })}
                    className="w-4 h-4 rounded text-sky-600 focus:ring-sky-500"
                  />
                  <span className="text-xs font-bold text-sky-700">顯示</span>
                </label>
              </div>
            </div>

            <div>
              <label className="block text-xs text-sky-600 mb-1 ml-1">專案名稱</label>
              <input type="text" value={card.intlProjectName || ''} onChange={e => setCard({ ...card, intlProjectName: e.target.value })} placeholder="例: 國外回饋" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
            </div>

            <div>
              <label className="block text-xs text-sky-600 mb-1 ml-1">國外回饋說明</label>
              <input type="text" value={card.intlDesc || ''} onChange={e => setCard({ ...card, intlDesc: e.target.value })} placeholder="註記細節，如「國外實體限定」" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
            </div>

            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-sky-600 mb-1 ml-1">回饋比例 (%)</label>
                <input type="number" value={card.intlCashbackRate || ''} onChange={e => setCard({ ...card, intlCashbackRate: Number(e.target.value) })} placeholder="11" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-sky-600 mb-1 ml-1">刷卡上限</label>
                <input type="text" value={card.intlCashbackLimit || ''} onChange={e => setCard({ ...card, intlCashbackLimit: e.target.value })} placeholder="例: 6250" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
              </div>
            </div>

            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-sky-600 mb-1 ml-1">回饋有效日期</label>
                <input type="date" value={card.intlCashbackExpiry || ''} onChange={e => setCard({ ...card, intlCashbackExpiry: e.target.value })} className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-sky-600 mb-1 ml-1">門檻</label>
                <input type="text" value={card.intlThreshold || ''} onChange={e => setCard({ ...card, intlThreshold: e.target.value })} placeholder="例: 需自動扣繳" className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
              </div>
            </div>

            <div>
              <label className="block text-xs text-sky-600 mb-1 ml-1">備註</label>
              <input type="text" value={card.intlNotes || ''} onChange={e => setCard({ ...card, intlNotes: e.target.value })} placeholder="關鍵備註..." className="w-full bg-white rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500 border border-sky-100" />
            </div>
          </div>

          <div className="sticky bottom-0 bg-white pt-4 pb-2 flex gap-3 mt-6 border-t border-gray-100">
            {editingCard && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><Trash2 size={24} /></button>}
            <button onClick={save} className="flex-1 py-4 bg-[#5C7FB0] text-white rounded-2xl font-bold text-lg shadow-md active:scale-95">儲存卡片</button>
          </div>
        </div>
      </CenterModalWrapper>
    );
  };

  const BankModal = () => {
    const [bank, setBank] = useState(editingBank || { 
      id: '', bank: '', balance: 0, lastUpdated: format(new Date(), 'yyyy-MM-dd'),
      apy: 1.5, highInterestLimit: 100000, payoutDay: 21,
      tasks: [], pockets: []
    });
    
    const [newTaskDesc, setNewTaskDesc] = useState('');
    const [newPocket, setNewPocket] = useState({ name: '', balance: 0, apy: 2.0, duration: '1年', endDate: format(addMonths(new Date(), 12), 'yyyy-MM-dd') });

    const save = () => {
      if (!bank.bank) return;
      let newBanks;
      if (editingBank) {
        newBanks = banks.map(b => b.id === bank.id ? bank : b);
      } else {
        newBanks = [...banks, { ...bank, id: generateId() }];
      }
      setBanks(newBanks);
      console.log("銀行資料已儲存", bank);
      setIsBankModalOpen(false);
    };
    const remove = () => { setBanks(banks.filter(b => b.id !== bank.id)); setIsBankModalOpen(false); };

    const addTask = () => {
      if (!newTaskDesc) return;
      setBank({
        ...bank,
        tasks: [...bank.tasks, { id: generateId(), description: newTaskDesc, isCompleted: false }]
      });
      setNewTaskDesc('');
    };

    const addPocket = () => {
      if (!newPocket.name || !newPocket.balance) return;
      setBank({
        ...bank,
        pockets: [...bank.pockets, { ...newPocket, id: generateId() }]
      });
      setNewPocket({ name: '', balance: 0, apy: 2.0, duration: '1年', endDate: format(addMonths(new Date(), 12), 'yyyy-MM-dd') });
    };

    return (
      <CenterModalWrapper isOpen={isBankModalOpen} onClose={() => setIsBankModalOpen(false)} title={editingBank ? "編輯網銀" : "新增網銀"}>
        <div className="space-y-6 max-h-[70vh] overflow-y-auto no-scrollbar pr-1">
          <div className="space-y-4">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">基本資訊</h3>
            <input type="text" value={bank.bank} onChange={e => setBank({ ...bank, bank: e.target.value })} placeholder="銀行名稱 (例: Richart)" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">儲值餘額 ($)</label>
                <input type="number" value={bank.balance || ''} onChange={e => setBank({ ...bank, balance: Number(e.target.value) })} placeholder="0" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">最後更新日期</label>
                <input type="date" value={bank.lastUpdated} onChange={e => setBank({ ...bank, lastUpdated: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
            </div>
          </div>

          <div className="space-y-4">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">高利活存設定</h3>
            <div className="flex gap-4">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">年利率 (APY %)</label>
                <input type="number" step="0.1" value={bank.apy || ''} onChange={e => setBank({ ...bank, apy: Number(e.target.value) })} placeholder="1.5" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1 ml-1">高利額度 ($)</label>
                <input type="number" value={bank.highInterestLimit || ''} onChange={e => setBank({ ...bank, highInterestLimit: Number(e.target.value) })} placeholder="100000" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
              </div>
            </div>
            <div>
              <label className="block text-xs text-gray-500 mb-1 ml-1">每月發息日 (1-31)</label>
              <input type="number" min="1" max="31" value={bank.payoutDay || ''} onChange={e => setBank({ ...bank, payoutDay: Number(e.target.value) })} placeholder="21" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
            </div>
          </div>

          <div className="space-y-4">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">任務清單</h3>
            <div className="space-y-2">
              {bank.tasks.map(task => (
                <div key={task.id} className="flex justify-between items-center bg-gray-50 p-2 rounded-xl">
                  <span className="text-xs text-gray-700">{task.description}</span>
                  <button onClick={() => setBank({ ...bank, tasks: bank.tasks.filter(t => t.id !== task.id) })} className="text-red-400"><X size={14} /></button>
                </div>
              ))}
              <div className="flex gap-2">
                <input type="text" value={newTaskDesc} onChange={e => setNewTaskDesc(e.target.value)} placeholder="新增任務..." className="flex-1 bg-gray-50 rounded-xl px-3 py-2 text-xs outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
                <button onClick={addTask} className="bg-[#5C7FB0] text-white px-3 rounded-xl text-xs font-bold">新增</button>
              </div>
            </div>
          </div>

          <div className="space-y-4">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider">口袋帳戶 / 專案</h3>
            <div className="space-y-2">
              {bank.pockets.map(pocket => (
                <div key={pocket.id} className="flex justify-between items-center bg-blue-50 p-2 rounded-xl">
                  <div className="text-[10px]">
                    <div className="font-bold">{pocket.name}</div>
                    <div>$ {pocket.balance} · {pocket.apy}%</div>
                  </div>
                  <button onClick={() => setBank({ ...bank, pockets: bank.pockets.filter(p => p.id !== pocket.id) })} className="text-red-400"><X size={14} /></button>
                </div>
              ))}
              <div className="bg-gray-50 p-3 rounded-2xl space-y-2">
                <input type="text" value={newPocket.name} onChange={e => setNewPocket({ ...newPocket, name: e.target.value })} placeholder="專案名稱" className="w-full bg-white rounded-xl px-3 py-2 text-xs outline-none" />
                <div className="flex gap-2">
                  <input type="number" value={newPocket.balance || ''} onChange={e => setNewPocket({ ...newPocket, balance: Number(e.target.value) })} placeholder="金額" className="flex-1 bg-white rounded-xl px-3 py-2 text-xs outline-none" />
                  <input type="number" step="0.1" value={newPocket.apy || ''} onChange={e => setNewPocket({ ...newPocket, apy: Number(e.target.value) })} placeholder="APY %" className="flex-1 bg-white rounded-xl px-3 py-2 text-xs outline-none" />
                </div>
                <div className="flex gap-2">
                  <input type="text" value={newPocket.duration} onChange={e => setNewPocket({ ...newPocket, duration: e.target.value })} placeholder="時長 (例: 1年)" className="flex-1 bg-white rounded-xl px-3 py-2 text-xs outline-none" />
                  <input type="date" value={newPocket.endDate} onChange={e => setNewPocket({ ...newPocket, endDate: e.target.value })} className="flex-1 bg-white rounded-xl px-3 py-2 text-xs outline-none" />
                </div>
                <button onClick={addPocket} className="w-full bg-[#5C7FB0] text-white py-2 rounded-xl text-xs font-bold">新增專案</button>
              </div>
            </div>
          </div>
        </div>
        <div className="sticky bottom-0 bg-white pt-4 pb-2 flex gap-3 mt-6 border-t border-gray-100">
          {editingBank && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><Trash2 size={24} /></button>}
          <button onClick={save} className="flex-1 py-4 bg-[#5C7FB0] text-white rounded-2xl font-bold text-lg shadow-md active:scale-95">儲存帳戶</button>
        </div>
      </CenterModalWrapper>
    );
  };

  const renderConfirmRecurringModal = () => {
    if (!confirmingRecurring) return null;
    const { stock, setting, date } = confirmingRecurring;
    
    const handleConfirm = () => {
      if (actualRecPrice <= 0) return;
      
      const newShares = Math.round((setting.amount / actualRecPrice) * 100) / 100;
      const newTx: StockTransaction = {
        id: generateId(),
        date: actualRecDate,
        type: 'recurring',
        shares: newShares,
        amount: setting.amount,
        price: actualRecPrice,
        originalDay: setting.day,
        securitiesBank: confirmBank
      };

      const updatedStock = {
        ...stock,
        shares: stock.shares + newShares,
        historicalCost: stock.historicalCost + setting.amount,
        transactions: [...stock.transactions, newTx],
        lastUpdated: format(new Date(), 'yyyy-MM-dd')
      };

      setStocks(stocks.map(s => s.id === stock.id ? updatedStock : s));

      // 自動連動帳務
      const accountingTx: Transaction = {
        id: generateId(),
        title: `股票定額 - ${stock.code}`,
        amount: setting.amount,
        convertedAmount: setting.amount,
        type: 'expense',
        category: '股票',
        date: actualRecDate,
        paymentMethod: '銀行轉帳',
        bank: confirmBank,
        location: '國內',
        currency: 'TWD',
        notes: ''
      };
      setTransactions(prev => [accountingTx, ...prev]);

      // 解除網銀自動扣款聯動 (根據使用者要求)
      // setBanks(prev => prev.map(b => 
      //   b.bank === confirmBank ? { ...b, balance: b.balance - setting.amount, lastUpdated: format(new Date(), 'yyyy-MM-dd') } : b
      // ));

      setConfirmingRecurring(null);
      console.log("定期定額已確認並儲存", updatedStock);
    };

    return (
      <CenterModalWrapper isOpen={!!confirmingRecurring} onClose={() => setConfirmingRecurring(null)} title="確認定期定額扣款">
        <div className="space-y-6">
          <div className="bg-gray-50 p-4 rounded-2xl">
            <div className="text-sm font-bold text-gray-700 mb-1">{stock.name} ({stock.code})</div>
            <div className="text-xs text-gray-500">預計扣款金額: <span className="text-orange-600 font-bold">${setting.amount.toLocaleString()}</span></div>
          </div>

          <div className="space-y-4">
            <div className="space-y-1">
              <label className="text-xs text-gray-400 ml-1">實際扣款日期</label>
              <input type="date" value={actualRecDate} onChange={e => setActualRecDate(e.target.value)} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-orange-400 font-bold" />
            </div>
            <div className="space-y-1">
              <label className="text-xs text-gray-400 ml-1">實際成交單價 (股價)</label>
              <input type="number" step="0.01" value={actualRecPrice || ''} onChange={e => setActualRecPrice(Number(e.target.value))} placeholder="請輸入成交價" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-orange-400 font-bold text-lg" />
            </div>
            <div className="space-y-1">
              <label className="text-xs text-gray-400 ml-1">證券銀行</label>
              <select value={confirmBank} onChange={e => setConfirmBank(e.target.value)} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-orange-400 font-bold appearance-none">
                {banks.map(b => <option key={b.id} value={b.bank}>{b.bank}</option>)}
              </select>
            </div>
          </div>

          <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100">
            <div className="flex justify-between items-center">
              <span className="text-xs text-orange-700">預估購入股數</span>
              <span className="text-lg font-bold text-orange-600">{actualRecPrice > 0 ? (setting.amount / actualRecPrice).toFixed(2) : '0.00'} 股</span>
            </div>
          </div>

          <button onClick={handleConfirm} className="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold text-lg shadow-md active:scale-95 transition-transform">
            確認並記帳
          </button>
        </div>
      </CenterModalWrapper>
    );
  };

  const MemoModal = () => {
    const [memo, setMemo] = useState(editingMemo || { id: '', title: '', person: '', amount: 0, type: 'monthly', startDate: format(new Date(), 'yyyy-MM'), payments: {}, records: [], isSettled: false, customMonths: [] });
    
    const toggleCustomMonth = (month: number) => {
      const currentMonths = memo.customMonths || [];
      if (currentMonths.includes(month)) {
        setMemo({ ...memo, customMonths: currentMonths.filter(m => m !== month) });
      } else {
        setMemo({ ...memo, customMonths: [...currentMonths, month] });
      }
    };

    const save = () => {
      if (!memo.title || !memo.person) return;
      let newMemos;
      if (editingMemo) {
        newMemos = memos.map(m => m.id === memo.id ? memo : m);
      } else {
        newMemos = [...memos, { ...memo, id: generateId() }];
      }
      setMemos(newMemos);
      console.log("備忘錄資料已儲存", memo);
      setIsMemoModalOpen(false);
    };
    const remove = () => { setMemos(memos.filter(m => m.id !== memo.id)); setIsMemoModalOpen(false); };

    return (
      <CenterModalWrapper isOpen={isMemoModalOpen} onClose={() => setIsMemoModalOpen(false)} title={editingMemo ? "編輯款項" : "新增款項"}>
        <div className="space-y-4 max-h-[70vh] overflow-y-auto no-scrollbar pr-1">
          <div className="flex gap-2 p-1 bg-gray-100 rounded-xl">
            <button onClick={() => setMemo({ ...memo, type: 'monthly', startDate: format(new Date(), 'yyyy-MM') })} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${memo.type === 'monthly' ? 'bg-white text-[#5C7FB0] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>每月</button>
            <button onClick={() => setMemo({ ...memo, type: 'custom' })} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${memo.type === 'custom' ? 'bg-white text-[#5C7FB0] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>自定義</button>
            <button onClick={() => setMemo({ ...memo, type: 'one-time', startDate: format(new Date(), 'yyyy-MM-dd') })} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${memo.type === 'one-time' ? 'bg-white text-[#5C7FB0] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>單次</button>
          </div>

          {memo.type === 'custom' && (
            <div className="bg-gray-50 p-4 rounded-2xl border border-gray-200">
              <label className="block text-xs font-bold text-gray-500 mb-3 uppercase tracking-wider">選擇收款月份</label>
              <div className="grid grid-cols-4 gap-2">
                {Array.from({ length: 12 }, (_, i) => i + 1).map(month => (
                  <button
                    key={month}
                    onClick={() => toggleCustomMonth(month)}
                    className={`py-2 rounded-xl text-xs font-bold border transition-all ${memo.customMonths?.includes(month) ? 'bg-[#5C7FB0] text-white border-[#5C7FB0] shadow-sm' : 'bg-white text-gray-400 border-gray-200'}`}
                  >
                    {month}月
                  </button>
                ))}
              </div>
            </div>
          )}

          <input type="text" value={memo.title} onChange={e => setMemo({ ...memo, title: e.target.value })} placeholder="項目名稱 (例: Netflix 分租)" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
          <input type="text" value={memo.person} onChange={e => setMemo({ ...memo, person: e.target.value })} placeholder="對象 (例: 小明)" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
          <div className="flex gap-4">
            <div className="flex-1">
              <label className="block text-xs text-gray-500 mb-1 ml-1">{memo.type !== 'one-time' ? '每月金額 ($)' : '金額 ($)'}</label>
              <input type="number" value={memo.amount || ''} onChange={e => setMemo({ ...memo, amount: Number(e.target.value) })} placeholder="220" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
            </div>
            <div className="flex-1">
              <label className="block text-xs text-gray-500 mb-1 ml-1">{memo.type !== 'one-time' ? '起始月份' : '日期'}</label>
              <input type={memo.type !== 'one-time' ? 'month' : 'date'} value={memo.startDate} onChange={e => setMemo({ ...memo, startDate: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
            </div>
          </div>
        </div>
        <div className="sticky bottom-0 bg-white pt-4 pb-2 flex gap-3 mt-6 border-t border-gray-100">
          {editingMemo && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><Trash2 size={24} /></button>}
          <button onClick={save} className="flex-1 py-4 bg-[#5C7FB0] text-white rounded-2xl font-bold text-lg shadow-md active:scale-95">儲存備忘錄</button>
        </div>
      </CenterModalWrapper>
    );
  };

  const RecordModal = () => {
    const [record, setRecord] = useState(editingRecord || { id: '', title: '', date: format(new Date(), 'yyyy-MM-dd'), amount: 0, notes: '' });
    
    const save = () => {
      if (!record.title || !activeMemoId) return;
      
      const memo = memos.find(m => m.id === activeMemoId);
      
      setMemos(memos.map(m => {
        if (m.id === activeMemoId) {
          const updatedRecords = editingRecord 
            ? m.records.map(r => r.id === record.id ? record : r)
            : [...(m.records || []), { ...record, id: generateId() }];
          return { ...m, records: updatedRecords };
        }
        return m;
      }));
      
      // 同步到帳務
      if (!editingRecord && memo) {
        const accountingTx: Transaction = {
          id: generateId(),
          title: `備忘錄收款: ${memo.title} - ${record.title}`,
          amount: record.amount,
          convertedAmount: record.amount,
          type: 'income',
          category: '代墊',
          date: record.date,
          paymentMethod: '現金', // 預設現金，可依需求調整
          bank: '',
          location: '國內',
          currency: 'TWD',
          notes: record.notes
        };
        setTransactions(prev => [accountingTx, ...prev]);
      }

      setIsRecordModalOpen(false);
    };

    const remove = () => {
      setMemos(memos.map(m => {
        if (m.id === activeMemoId) {
          return { ...m, records: m.records.filter(r => r.id !== record.id) };
        }
        return m;
      }));
      setIsRecordModalOpen(false);
    };

    return (
      <CenterModalWrapper isOpen={isRecordModalOpen} onClose={() => setIsRecordModalOpen(false)} title={editingRecord ? "編輯收款紀錄" : "新增收款紀錄"}>
        <div className="space-y-4">
          <input type="text" value={record.title} onChange={e => setRecord({ ...record, title: e.target.value })} placeholder="項目 (例: 2025收款)" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
          <div className="flex gap-4">
            <div className="flex-1">
              <label className="block text-xs text-gray-500 mb-1 ml-1">收款日期</label>
              <input type="date" value={record.date} onChange={e => setRecord({ ...record, date: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
            </div>
            <div className="flex-1">
              <label className="block text-xs text-gray-500 mb-1 ml-1">金額 ($)</label>
              <input type="number" value={record.amount || ''} onChange={e => setRecord({ ...record, amount: Number(e.target.value) })} placeholder="1100" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
            </div>
          </div>
          <div>
            <label className="block text-xs text-gray-500 mb-1 ml-1">備註</label>
            <input type="text" value={record.notes} onChange={e => setRecord({ ...record, notes: e.target.value })} placeholder="2025年款項已結清..." className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0]" />
          </div>
          <div className="sticky bottom-0 bg-white pt-4 pb-2 flex gap-3 mt-6 border-t border-gray-100">
            {editingRecord && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><Trash2 size={24} /></button>}
            <button onClick={save} className="flex-1 py-4 bg-[#5C7FB0] text-white rounded-2xl font-bold text-lg shadow-md active:scale-95">儲存紀錄</button>
          </div>
        </div>
      </CenterModalWrapper>
    );
  };

  const StockModal = () => {
    const [stock, setStock] = useState(editingStock || { 
      id: '', name: '', code: '', shares: 0, historicalCost: 0, lastUpdated: format(new Date(), 'yyyy-MM-dd'), transactions: [], recurringSettings: []
    });
    
    const [isManagingOptions, setIsManagingOptions] = useState(false);
    const [newOptionName, setNewOptionName] = useState('');
    const [newOptionCode, setNewOptionCode] = useState('');

    // 定期定額設定暫存
    const [newRecDay, setNewRecDay] = useState(13);
    const [newRecAmount, setNewRecAmount] = useState(5000);
    const [newRecStartDate, setNewRecStartDate] = useState(format(new Date(), 'yyyy-MM-dd'));

    // 單筆買入暫存
    const [singleDate, setSingleDate] = useState(format(new Date(), 'yyyy-MM-dd'));
    const [singleShares, setSingleShares] = useState(0);
    const [singleAmount, setSingleAmount] = useState(0);
    const [singleBank, setSingleBank] = useState('永豐 大戶DAWHO');

    const [newTransactions, setNewTransactions] = useState([]);

    const save = () => {
      if (!stock.name || !stock.code) return;
      let newStocks;
      if (editingStock) {
        newStocks = stocks.map(s => s.id === stock.id ? stock : s);
      } else {
        newStocks = [...stocks, { ...stock, id: generateId() }];
      }
      setStocks(newStocks);
      
      // 只有在按下儲存後，才將本次新增的交易紀錄同步到帳務
      if (newTransactions.length > 0) {
        setTransactions(prev => [...newTransactions, ...prev]);
      }
      
      console.log("股票資料已儲存", stock);
      setIsStockModalOpen(false);
    };

    const addRecurringSetting = () => {
      const day = Math.min(30, Math.max(1, newRecDay));
      const newSetting: RecurringSetting = {
        id: generateId(),
        day: day,
        amount: newRecAmount,
        startDate: newRecStartDate
      };
      setStock({
        ...stock,
        recurringSettings: [...(stock.recurringSettings || []), newSetting]
      });
    };

    const removeRecurringSetting = (id: string) => {
      setStock({
        ...stock,
        recurringSettings: stock.recurringSettings.filter(s => s.id !== id)
      });
    };

    const addTransaction = (type: 'single' | 'recurring') => {
      let newShares = 0;
      let newAmount = 0;
      let date = '';
      let price = 0;
      let securitiesBank = singleBank;

      if (type === 'recurring') {
        return;
      } else {
        if (singleShares <= 0 || singleAmount <= 0) return;
        newShares = singleShares;
        newAmount = singleAmount;
        date = singleDate;
      }

      const newTx: StockTransaction = { id: generateId(), date, type, shares: newShares, amount: newAmount, price, securitiesBank };
      
      setStock({
        ...stock,
        shares: stock.shares + newShares,
        historicalCost: stock.historicalCost + newAmount,
        transactions: [...stock.transactions, newTx],
        lastUpdated: format(new Date(), 'yyyy-MM-dd')
      });

      // 暫存帳務連動紀錄，等按下儲存才正式寫入
      const txLog: Transaction = {
        id: generateId(),
        title: `股票買入: ${stock.name} (單筆)`,
        amount: newAmount,
        convertedAmount: newAmount,
        type: 'expense',
        category: '股票',
        date: date,
        paymentMethod: '銀行轉帳',
        bank: securitiesBank,
        location: '國內',
        currency: 'TWD',
        notes: ''
      };
      setNewTransactions(prev => [txLog, ...prev]);
      
      // 重置輸入
      setSingleShares(0);
      setSingleAmount(0);
    };

    const removeOption = (id: string) => {
      setStockOptions(stockOptions.filter(o => o.id !== id));
    };

    const addOption = () => {
      if (!newOptionName || !newOptionCode) return;
      setStockOptions([...stockOptions, { id: generateId(), name: newOptionName, code: newOptionCode }]);
      setNewOptionName('');
      setNewOptionCode('');
    };

    return (
      <CenterModalWrapper isOpen={isStockModalOpen} onClose={() => setIsStockModalOpen(false)} title={editingStock ? "管理股票" : "新增股票"}>
        <div className="space-y-6 max-h-[75vh] overflow-y-auto no-scrollbar pr-1">
          
          {/* 股票選擇 */}
          <div className="space-y-3">
            <div className="flex justify-between items-center">
              <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">股票名稱</label>
              <button onClick={() => setIsManagingOptions(!isManagingOptions)} className="text-[#5C7FB0] text-xs font-bold bg-blue-50 px-3 py-1.5 rounded-xl">
                {isManagingOptions ? '完成' : '編輯清單'}
              </button>
            </div>

            {isManagingOptions ? (
              <div className="bg-gray-50 p-4 rounded-2xl space-y-3 border border-gray-100">
                <div className="space-y-2">
                  {stockOptions.map(opt => (
                    <div key={opt.id} className="flex justify-between items-center bg-white p-2 rounded-xl border border-gray-100">
                      <span className="text-sm font-bold text-gray-700">{opt.name} ({opt.code})</span>
                      <button onClick={() => removeOption(opt.id)} className="text-red-400 p-1"><Trash2 size={16} /></button>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  <input type="text" value={newOptionName} onChange={e => setNewOptionName(e.target.value)} placeholder="名稱" className="flex-1 bg-white rounded-xl px-3 py-2 text-xs border border-gray-200" />
                  <input type="text" value={newOptionCode} onChange={e => setNewOptionCode(e.target.value)} placeholder="代碼" className="w-20 bg-white rounded-xl px-3 py-2 text-xs border border-gray-200" />
                  <button onClick={addOption} className="bg-[#5C7FB0] text-white px-3 rounded-xl text-xs font-bold">新增</button>
                </div>
              </div>
            ) : (
              <div className="relative">
                <select 
                  value={stock.name} 
                  onChange={e => {
                    const opt = stockOptions.find(o => o.name === e.target.value);
                    if (opt) setStock({ ...stock, name: opt.name, code: opt.code });
                  }}
                  className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-[#5C7FB0] appearance-none font-bold text-gray-800"
                >
                  <option value="">請選擇股票...</option>
                  {stockOptions.map(opt => <option key={opt.id} value={opt.name}>{opt.name}</option>)}
                </select>
                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                  <ChevronRight size={20} className="rotate-90" />
                </div>
              </div>
            )}
            <div className="flex justify-between items-center px-1">
              <span className="text-xs text-gray-400">股票代碼</span>
              <span className="text-sm font-bold text-gray-700">{stock.code || '--'}</span>
            </div>
          </div>

          {/* 定期定額設定 */}
          <div className="bg-orange-50 p-5 rounded-3xl border border-orange-100 space-y-4">
            <h3 className="text-sm font-bold text-orange-600 flex items-center gap-2">
              <RefreshCw size={18} /> 定期定額設定
            </h3>
            
            {/* 已有的設定列表 */}
            <div className="space-y-2">
              {stock.recurringSettings?.map(s => (
                <div key={s.id} className="bg-white p-3 rounded-2xl border border-orange-100 flex justify-between items-center">
                  <div>
                    <div className="text-xs font-bold text-gray-700">每月 {s.day} 號 · ${s.amount.toLocaleString()}</div>
                    <div className="text-[10px] text-gray-400">起始日: {s.startDate}</div>
                  </div>
                  <button onClick={() => removeRecurringSetting(s.id)} className="text-red-400 p-2"><Trash2 size={16} /></button>
                </div>
              ))}
            </div>

            {/* 新增設定 */}
            <div className="bg-white/50 p-4 rounded-2xl border border-dashed border-orange-200 space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div className="space-y-1">
                  <label className="text-[10px] text-orange-600 font-bold ml-1">扣款日</label>
                  <input type="number" min="1" max="31" value={newRecDay} onChange={e => setNewRecDay(Number(e.target.value))} className="w-full bg-white border border-orange-100 rounded-xl py-2 px-3 text-sm outline-none" />
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] text-orange-600 font-bold ml-1">扣款金額</label>
                  <input type="number" value={newRecAmount} onChange={e => setNewRecAmount(Number(e.target.value))} className="w-full bg-white border border-orange-100 rounded-xl py-2 px-3 text-sm outline-none" />
                </div>
              </div>
              <div className="space-y-1">
                <label className="text-[10px] text-orange-600 font-bold ml-1">起始日期</label>
                <input type="date" value={newRecStartDate} onChange={e => setNewRecStartDate(e.target.value)} className="w-full bg-white border border-orange-100 rounded-xl py-2 px-3 text-sm outline-none" />
              </div>
              <button onClick={addRecurringSetting} className="w-full py-2 bg-orange-500 text-white rounded-xl text-xs font-bold shadow-sm">
                + 新增定期定額設定
              </button>
            </div>
          </div>

          {/* 單筆買入記錄 */}
          <div className="bg-blue-50/50 p-5 rounded-3xl border border-blue-100 space-y-4">
            <h3 className="text-sm font-bold text-blue-600 flex items-center gap-2">
              <Plus size={18} /> 單筆買入記錄
            </h3>
            <div className="grid grid-cols-2 gap-3">
              <div className="space-y-1">
                <label className="text-[10px] text-gray-400 ml-1">購買股數</label>
                <input type="number" value={singleShares || ''} onChange={e => setSingleShares(Number(e.target.value))} placeholder="1000" className="w-full bg-white rounded-xl py-2 px-3 text-sm border border-blue-100" />
              </div>
              <div className="space-y-1">
                <label className="text-[10px] text-gray-400 ml-1">購買總金額</label>
                <input type="number" value={singleAmount || ''} onChange={e => setSingleAmount(Number(e.target.value))} placeholder="73254" className="w-full bg-white rounded-xl py-2 px-3 text-sm border border-blue-100" />
              </div>
            </div>
            <div className="flex justify-between items-center">
              <input type="date" value={singleDate} onChange={e => setSingleDate(e.target.value)} className="bg-transparent text-xs text-blue-700 outline-none" />
              <div className="flex items-center gap-2">
                <select 
                  value={singleBank} 
                  onChange={e => setSingleBank(e.target.value)}
                  className="bg-white border border-blue-100 rounded-xl px-2 py-1 text-[10px] outline-none"
                >
                  {banks.map(b => <option key={b.id} value={b.bank}>{b.bank}</option>)}
                </select>
                <button onClick={() => addTransaction('single')} className="bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm active:scale-95">確認買入</button>
              </div>
            </div>
          </div>

          {/* 總結數據 */}
          <div className="bg-gray-50 p-5 rounded-3xl space-y-4">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">目前持倉總結</h3>
            <div className="grid grid-cols-2 gap-4">
              <div className="space-y-1">
                <label className="text-[10px] text-gray-500 ml-1">目前總持有股數</label>
                <input type="number" step="0.01" value={stock.shares} onChange={e => setStock({ ...stock, shares: Number(e.target.value) })} className="w-full bg-white rounded-2xl py-3 px-4 text-lg font-bold text-gray-800 border border-gray-100" />
              </div>
              <div className="space-y-1">
                <label className="text-[10px] text-gray-500 ml-1">歷史投入總本金</label>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日系簡約記帳本</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fuji: '#6B8EAD',
                        snow: '#F9F9F9',
                        warm: '#D1D1D1',
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem',
                        '5xl': '2.5rem',
                    }
                }
            }
        }
    </script>
    <!-- 引入傳統 CDN 資源 (UMD 版本) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@google/genai@1.29.0/dist/index.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

        :root {
            --fuji-blue: #6B8EAD;
            --snow-white: #F9F9F9;
            --warm-gray: #D1D1D1;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #F4F1ED;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模擬 App 點擊回饋 */
        .active-scale:active {
            transform: scale(0.95);
        }

        /* 自定義動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #F4F1ED;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="w-12 h-12 border-4 border-[#6B8EAD] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[#6B8EAD] font-bold animate-pulse">日系簡約記帳本 載入中...</p>
    </div>
    <div id="root"></div>

    <script>
        // 資源載入檢查 (非 Babel 編譯區，確保最快執行)
        window.addEventListener('load', () => {
            const missing = [];
            if (typeof React === 'undefined') missing.push('React');
            if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
            if (typeof LucideReact === 'undefined') missing.push('LucideReact');
            if (typeof Recharts === 'undefined') missing.push('Recharts');
            if (typeof dateFns === 'undefined') missing.push('date-fns');
            
            if (missing.length > 0) {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.innerHTML = `
                        <div class="p-8 text-center bg-white rounded-3xl shadow-xl max-w-xs mx-auto">
                            <p class="text-red-500 font-bold mb-4 text-lg">資源載入失敗</p>
                            <p class="text-sm text-gray-600 mb-2">請檢查網路連線，以下套件無法從 CDN 載入：</p>
                            <div class="bg-red-50 p-3 rounded-xl text-xs text-red-700 font-mono mb-4">
                                ${missing.join('<br>')}
                            </div>
                            <button onclick="window.location.reload()" class="w-full py-3 bg-[#6B8EAD] text-white rounded-xl font-bold active:scale-95 transition-transform">重新整理</button>
                        </div>
                    `;
                }
            }
        });
    </script>

    <script type="text/babel">
        // 使用 LucideReact 作為 React 元件來源
        const lucide = LucideReact;
        const { motion, AnimatePresence } = window.Motion || window.framerMotion || { motion: ({children}) => <div>{children}</div>, AnimatePresence: ({children}) => children };
        const { 
            PieChart, Pie, Cell, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, 
            Tooltip, Legend, LineChart, Line, AreaChart, Area 
        } = Recharts;
        const { 
            format, startOfMonth, endOfMonth, isWithinInterval, subMonths, 
            isBefore, addMonths, parseISO, differenceInDays 
        } = dateFns;
        const { GoogleGenAI } = window.googleGenai || {};

        // --- Constants & Types ---
        const CATEGORIES = ['食', '衣', '住', '行', '育', '樂', '醫療', '投資', '股票', '其他'];
        const PAYMENT_METHODS = ['現金', '信用卡', 'Line pay', '銀行轉帳', 'Line Pay money'];
        const LOCATIONS = ['國內', '國外'];
        const CURRENCIES = ['TWD', 'JPY', 'USD'];

        const CATEGORY_COLORS = {
            '食': '#FFB7B2', '衣': '#FFDAC1', '住': '#E2F0CB', '行': '#B5EAD7', 
            '育': '#C7CEEA', '樂': '#FF9AA2', '醫療': '#E0FEFE', '投資': '#FFFFD8', 
            '股票': '#F3FFE3', '其他': '#D1D1D1'
        };

        const CATEGORY_ICONS = {
            '食': '🍱', '衣': '👕', '住': '🏠', '行': '🚌', '育': '📚', 
            '樂': '🎮', '醫療': '🏥', '投資': '💰', '股票': '📈', '其他': '📦'
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- App Component ---
        function App() {
            // --- State ---
            const [activeTab, setActiveTab] = React.useState('帳務');
            const [transactions, setTransactions] = React.useState(() => JSON.parse(localStorage.getItem('transactions') || '[]'));
            const [cards, setCards] = React.useState(() => JSON.parse(localStorage.getItem('cards') || JSON.stringify([
                { id: '1', name: '國泰世華 CUBE', bank: '國泰世華', cashbackRate: 3, spendingLimit: 50000, expirationDate: '12/28', partnerChannels: '全家, 7-11, 蝦皮' },
                { id: '2', name: '台新 FlyGo', bank: '台新銀行', cashbackRate: 5, spendingLimit: 30000, expirationDate: '06/27', partnerChannels: '高鐵, 航空, 國外' }
            ])));
            const [banks, setBanks] = React.useState(() => JSON.parse(localStorage.getItem('banks') || JSON.stringify([
                { id: '1', bank: 'LINE Bank', balance: 150000, apy: 1.5, highInterestLimit: 50000, highInterestDate: '每月 21 號', lastUpdated: format(new Date(), 'yyyy-MM-dd') },
                { id: '2', bank: 'Richart', balance: 80000, apy: 3.2, highInterestLimit: 100000, highInterestDate: '每月 1 號', lastUpdated: format(new Date(), 'yyyy-MM-dd') }
            ])));
            const [memos, setMemos] = React.useState(() => JSON.parse(localStorage.getItem('memos') || JSON.stringify([
                { id: '1', title: '午餐代墊', amount: 250, person: '王小明', type: 'once', isSettled: false, date: format(new Date(), 'yyyy-MM-dd') },
                { id: '2', title: '房租分擔', amount: 8500, person: '室友 A', type: 'monthly', isSettled: true, date: format(new Date(), 'yyyy-MM-dd') }
            ])));
            const [stocks, setStocks] = React.useState(() => JSON.parse(localStorage.getItem('stocks') || '[]'));
            const [geminiKey, setGeminiKey] = React.useState(() => localStorage.getItem('gemini_api_key') || '');

            // Modals
            const [isTxModalOpen, setIsTxModalOpen] = React.useState(false);
            const [isCardModalOpen, setIsCardModalOpen] = React.useState(false);
            const [isBankModalOpen, setIsBankModalOpen] = React.useState(false);
            const [isMemoModalOpen, setIsMemoModalOpen] = React.useState(false);
            const [isStockModalOpen, setIsStockModalOpen] = React.useState(false);
            const [isAiModalOpen, setIsAiModalOpen] = React.useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = React.useState(false);

            // Editing state
            const [editingTx, setEditingTx] = React.useState(null);
            const [editingCard, setEditingCard] = React.useState(null);
            const [editingBank, setEditingBank] = React.useState(null);
            const [editingMemo, setEditingMemo] = React.useState(null);
            const [editingStock, setEditingStock] = React.useState(null);

            // AI State
            const [aiInput, setAiInput] = React.useState('');
            const [isAiProcessing, setIsAiProcessing] = React.useState(false);

            // Persistence
            React.useEffect(() => { localStorage.setItem('transactions', JSON.stringify(transactions)); }, [transactions]);
            React.useEffect(() => { localStorage.setItem('cards', JSON.stringify(cards)); }, [cards]);
            React.useEffect(() => { localStorage.setItem('banks', JSON.stringify(banks)); }, [banks]);
            React.useEffect(() => { localStorage.setItem('memos', JSON.stringify(memos)); }, [memos]);
            React.useEffect(() => { localStorage.setItem('stocks', JSON.stringify(stocks)); }, [stocks]);
            React.useEffect(() => { localStorage.setItem('gemini_api_key', geminiKey); }, [geminiKey]);

            // --- AI Logic ---
            const processAiInput = async () => {
                if (!aiInput.trim()) return;
                if (!geminiKey) {
                    alert('請先在設定中輸入 Gemini API Key');
                    setIsSettingsModalOpen(true);
                    return;
                }

                setIsAiProcessing(true);
                try {
                    const genAI = new GoogleGenAI(geminiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    
                    const systemPrompt = `你是一個專業的記帳助手。請將使用者的自然語言輸入轉換為 JSON 格式。
                    JSON 格式必須包含：
                    - title: 項目名稱
                    - amount: 金額 (數字)
                    - type: 'expense' 或 'income'
                    - category: 類別 (食, 衣, 住, 行, 育, 樂, 醫療, 投資, 股票, 其他)
                    - paymentMethod: 支付方式 (現金, 信用卡, Line pay, 銀行轉帳, Line Pay money)
                    - location: '國內' 或 '國外'
                    - date: YYYY-MM-DD
                    - notes: 備註

                    目前的日期是 ${format(new Date(), 'yyyy-MM-dd')}。
                    如果使用者沒提到日期，請預設為今天。
                    如果使用者沒提到類別，請根據標題自動判斷。
                    如果使用者沒提到支付方式，請預設為 '現金'。
                    
                    範例輸入：'今天在全家買了 100 元的早餐用 Line pay'
                    範例輸出：{ "title": "全家早餐", "amount": 100, "type": "expense", "category": "食", "paymentMethod": "Line pay", "location": "國內", "date": "2026-03-15", "notes": "" }
                    
                    請只回傳 JSON 字串，不要有任何 Markdown 標籤或額外文字。`;

                    const result = await model.generateContent([systemPrompt, aiInput]);
                    const response = await result.response;
                    const text = response.text();
                    
                    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
                    
                    // Populate TxModal
                    setEditingTx(null);
                    setInitialTx({
                        id: generateId(),
                        ...parsed,
                        convertedAmount: parsed.amount,
                        currency: 'TWD'
                    });
                    setIsAiModalOpen(false);
                    setIsTxModalOpen(true);
                    setAiInput('');
                } catch (error) {
                    console.error('AI Processing Error:', error);
                    alert('AI 處理失敗，請檢查 API Key 或輸入內容。');
                } finally {
                    setIsAiProcessing(false);
                }
            };

            const updateStockPrices = async () => {
                if (stocks.length === 0) return;
                if (!geminiKey) {
                    alert('請先在設定中輸入 Gemini API Key 以更新股價');
                    setIsSettingsModalOpen(true);
                    return;
                }

                setIsAiProcessing(true);
                try {
                    const genAI = new GoogleGenAI(geminiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    
                    const codes = stocks.map(s => s.code);
                    const prompt = `請幫我查詢以下股票目前的市場價格（單位：台幣 TWD）：${codes.join(', ')}。
                    請只回傳 JSON 格式，例如：{"2330": 600, "0050": 150}。
                    請確保回傳的是純 JSON，不要有 Markdown 標籤。`;

                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    const text = response.text();
                    
                    const prices = JSON.parse(text.replace(/```json|```/g, '').trim());
                    
                    const newStocks = stocks.map(s => ({
                        ...s,
                        currentPrice: prices[s.code] || s.currentPrice || 0,
                        lastUpdated: format(new Date(), 'yyyy-MM-dd')
                    }));
                    setStocks(newStocks);
                    alert('股價更新成功！');
                } catch (error) {
                    console.error('Stock Update Error:', error);
                    alert('股價更新失敗，請稍後再試。');
                } finally {
                    setIsAiProcessing(false);
                }
            };

            const [searchTerm, setSearchTerm] = React.useState('');
            const [selectedMonth, setSelectedMonth] = React.useState(() => format(new Date(), 'yyyy-MM'));
            const [selectedCategory, setSelectedCategory] = React.useState('全部');
            const [initialTx, setInitialTx] = React.useState(null);

            // --- Helper Components ---
            const ModalWrapper = ({ isOpen, onClose, title, children }) => (
                <AnimatePresence>
                    {isOpen && (
                        <>
                            <motion.div 
                                initial={{ opacity: 0 }} 
                                animate={{ opacity: 1 }} 
                                exit={{ opacity: 0 }} 
                                onClick={onClose} 
                                className="fixed inset-0 bg-black/30 backdrop-blur-sm z-[60]" 
                            />
                            <motion.div 
                                initial={{ y: '100%' }} 
                                animate={{ y: 0 }} 
                                exit={{ y: '100%' }} 
                                transition={{ type: 'spring', damping: 25, stiffness: 200 }} 
                                className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[2.5rem] p-6 z-[70] shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar"
                            >
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-gray-800">{title}</h2>
                                    <button onClick={onClose} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200"><lucide.X size={20} /></button>
                                </div>
                                {children}
                            </motion.div>
                        </>
                    )}
                </AnimatePresence>
            );

            const NavButton = ({ icon: Icon, label, isActive, onClick }) => (
                <button onClick={onClick} className="flex flex-col items-center justify-center gap-1 min-w-[60px]">
                    <Icon size={24} strokeWidth={isActive ? 2.5 : 2} className={`transition-colors ${isActive ? 'text-[#6B8EAD]' : 'text-gray-400'}`} />
                    <span className={`text-[10px] font-bold transition-colors ${isActive ? 'text-[#6B8EAD]' : 'text-gray-400'}`}>{label}</span>
                </button>
            );

            // --- Tab Renders ---
            const renderAccounting = () => {
                // Calculate summary for selected month
                const monthTxs = transactions.filter(t => t.date.startsWith(selectedMonth));
                const income = monthTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.convertedAmount, 0);
                const expense = monthTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.convertedAmount, 0);

                // Filtering logic
                const filteredTxs = transactions.filter(t => {
                    const matchesSearch = !searchTerm || 
                        t.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        t.category.includes(searchTerm) ||
                        t.notes?.toLowerCase().includes(searchTerm.toLowerCase());
                    
                    const matchesMonth = searchTerm ? true : t.date.startsWith(selectedMonth);
                    const matchesCategory = selectedCategory === '全部' || t.category === selectedCategory;

                    return matchesSearch && matchesMonth && matchesCategory;
                });

                const displayTxs = searchTerm ? filteredTxs : filteredTxs.slice(0, 50);

                return (
                    <div className="flex-1 overflow-y-auto no-scrollbar pb-32 p-4 space-y-6">
                        {/* Header */}
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-800">Hi, Pusheen</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <lucide.Calendar size={14} className="text-gray-400" />
                                    <input 
                                        type="month" 
                                        value={selectedMonth}
                                        onChange={e => setSelectedMonth(e.target.value)}
                                        className="text-sm font-bold text-[#6B8EAD] bg-transparent outline-none cursor-pointer"
                                    />
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsAiModalOpen(true)} className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-[#6B8EAD] active:scale-95 transition-transform">
                                    <lucide.Sparkles size={20} />
                                </button>
                                <button onClick={() => setIsSettingsModalOpen(true)} className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-gray-400 active:scale-95 transition-transform">
                                    <lucide.Settings size={20} />
                                </button>
                            </div>
                        </div>

                        {/* Summary Card */}
                        <div className="bg-[#6B8EAD] rounded-[2.5rem] p-6 text-white shadow-[0_20px_40px_rgba(92,127,176,0.25)] relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl" />
                            <div className="relative z-10">
                                <p className="text-white/70 text-sm font-medium mb-1">{format(parseISO(selectedMonth + '-01'), 'yyyy年M月')} 結餘</p>
                                <h2 className="text-4xl font-bold mb-6 tracking-tight">
                                    <span className="text-2xl mr-1">$</span>
                                    {(income - expense).toLocaleString()}
                                </h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/10 rounded-2xl p-3 backdrop-blur-md">
                                        <div className="flex items-center gap-2 mb-1">
                                            <div className="w-6 h-6 bg-emerald-400/20 rounded-full flex items-center justify-center">
                                                <lucide.ArrowDownLeft size={14} className="text-emerald-400" />
                                            </div>
                                            <span className="text-xs text-white/70">收入</span>
                                        </div>
                                        <p className="font-bold text-lg">${income.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white/10 rounded-2xl p-3 backdrop-blur-md">
                                        <div className="flex items-center gap-2 mb-1">
                                            <div className="w-6 h-6 bg-orange-400/20 rounded-full flex items-center justify-center">
                                                <lucide.ArrowUpRight size={14} className="text-orange-400" />
                                            </div>
                                            <span className="text-xs text-white/70">支出</span>
                                        </div>
                                        <p className="font-bold text-lg">${expense.toLocaleString()}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Quick Actions */}
                        <div className="flex gap-3">
                            <button 
                                onClick={() => { setEditingTx(null); setInitialTx(null); setIsTxModalOpen(true); }}
                                className="flex-1 py-4 bg-white rounded-2xl shadow-sm flex items-center justify-center gap-2 font-bold text-gray-700 active:scale-95 transition-transform"
                            >
                                <lucide.Plus size={20} className="text-[#6B8EAD]" /> 新增紀錄
                            </button>
                            <button 
                                onClick={() => setIsAiModalOpen(true)}
                                className="flex-1 py-4 bg-white rounded-2xl shadow-sm flex items-center justify-center gap-2 font-bold text-gray-700 active:scale-95 transition-transform"
                            >
                                <lucide.Mic size={20} className="text-purple-500" /> AI 語音/文字
                            </button>
                        </div>

                        {/* Search & Filter */}
                        <div className="space-y-4">
                            <div className="relative">
                                <input 
                                    type="text" 
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                    placeholder="搜尋項目、類別或備註..." 
                                    className="w-full bg-white rounded-2xl py-3 px-10 outline-none shadow-sm text-sm border border-transparent focus:border-[#6B8EAD] transition-all"
                                />
                                <lucide.Search size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
                                {searchTerm && (
                                    <button onClick={() => setSearchTerm('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
                                        <lucide.X size={16} />
                                    </button>
                                )}
                            </div>

                            {/* Category Chips */}
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                {['全部', ...CATEGORIES].map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setSelectedCategory(cat)}
                                        className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-[#6B8EAD] text-white shadow-md' : 'bg-white text-gray-400 shadow-sm'}`}
                                    >
                                        {cat === '全部' ? '全部' : `${CATEGORY_ICONS[cat]} ${cat}`}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Recent Transactions */}
                        <div className="space-y-4">
                            <div className="flex justify-between items-center">
                                <h3 className="font-bold text-gray-800">
                                    {searchTerm ? '搜尋結果' : `${format(parseISO(selectedMonth + '-01'), 'M月')}紀錄`}
                                </h3>
                                {!searchTerm && <span className="text-[10px] text-gray-400 font-bold">{filteredTxs.length} 筆資料</span>}
                            </div>
                            <div className="space-y-3">
                                {displayTxs.map(tx => (
                                    <div 
                                        key={tx.id} 
                                        onClick={() => { setEditingTx(tx); setIsTxModalOpen(true); }}
                                        className="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer"
                                    >
                                        <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-xl" style={{ backgroundColor: CATEGORY_COLORS[tx.category] || '#F3F4F6' }}>
                                            {CATEGORY_ICONS[tx.category] || '📦'}
                                        </div>
                                        <div className="flex-1">
                                            <p className="font-bold text-gray-800">{tx.title}</p>
                                            <p className="text-xs text-gray-400">{tx.date} · {tx.paymentMethod}</p>
                                        </div>
                                        <div className={`font-bold ${tx.type === 'expense' ? 'text-orange-500' : 'text-emerald-500'}`}>
                                            {tx.type === 'expense' ? '-' : '+'}${tx.convertedAmount.toLocaleString()}
                                        </div>
                                    </div>
                                ))}
                                {displayTxs.length === 0 && (
                                    <div className="bg-white/50 border-2 border-dashed border-gray-200 rounded-3xl py-12 flex flex-col items-center justify-center text-gray-400 space-y-2">
                                        <lucide.Search size={32} strokeWidth={1.5} />
                                        <p className="text-sm font-bold">尚無符合的紀錄</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderCreditCards = () => (
                <div className="flex-1 overflow-y-auto no-scrollbar pb-32 p-4 space-y-6">
                    <h1 className="text-2xl font-bold text-gray-800">信用卡管理</h1>
                    <div className="space-y-4">
                        {cards.map(card => {
                            let isExpired = false;
                            try {
                                if (card.expirationDate && card.expirationDate.includes('/')) {
                                    const [m, y] = card.expirationDate.split('/');
                                    const expDate = endOfMonth(parseISO(`20${y}-${m}-01`));
                                    isExpired = isBefore(expDate, new Date());
                                }
                            } catch (e) { console.error(e); }

                            return (
                                <div 
                                    key={card.id} 
                                    onClick={() => { setEditingCard(card); setIsCardModalOpen(true); }}
                                    className="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 space-y-4 relative overflow-hidden active:scale-[0.98] transition-transform cursor-pointer"
                                >
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-xs text-gray-400 font-bold uppercase tracking-wider">{card.bank}</p>
                                            <h3 className="text-lg font-bold text-gray-800">{card.name}</h3>
                                        </div>
                                        <div className="flex flex-col items-end gap-1">
                                            <div className="bg-blue-50 text-[#6B8EAD] text-[10px] font-bold px-2 py-1 rounded-lg">
                                                {card.cashbackRate}% 回饋
                                            </div>
                                            {isExpired && (
                                                <div className="bg-red-50 text-red-500 text-[10px] font-bold px-2 py-1 rounded-lg flex items-center gap-1">
                                                    <lucide.AlertCircle size={10} /> 逾期
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-xs text-gray-500">
                                            <span>本月消費額度</span>
                                            <span>75%</span>
                                        </div>
                                        <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                                            <div className="h-full bg-[#6B8EAD] rounded-full" style={{ width: '75%' }} />
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center pt-2">
                                        <div className="text-xs text-gray-400">
                                            結帳日: {card.paymentMethod || '--'}
                                        </div>
                                        <div className="text-sm font-bold text-gray-700">
                                            上限: ${card.spendingLimit?.toLocaleString()}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        <button 
                            onClick={() => { setEditingCard(null); setIsCardModalOpen(true); }}
                            className="w-full py-6 border-2 border-dashed border-gray-200 rounded-[2rem] text-gray-400 font-bold flex flex-col items-center gap-2 hover:bg-white hover:border-[#6B8EAD] hover:text-[#6B8EAD] transition-all"
                        >
                            <lucide.Plus size={24} />
                            <span>新增信用卡</span>
                        </button>
                    </div>
                </div>
            );

            const renderBanking = () => (
                <div className="flex-1 overflow-y-auto no-scrollbar pb-32 p-4 space-y-6">
                    <h1 className="text-2xl font-bold text-gray-800">網銀資產</h1>
                    <div className="grid grid-cols-1 gap-4">
                        {banks.map(bank => (
                            <div 
                                key={bank.id} 
                                onClick={() => { setEditingBank(bank); setIsBankModalOpen(true); }}
                                className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-4 active:scale-[0.98] transition-transform cursor-pointer"
                            >
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center text-[#6B8EAD]">
                                            <lucide.Landmark size={20} />
                                        </div>
                                        <h3 className="font-bold text-gray-800">{bank.bank}</h3>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-2xl font-bold text-gray-800">${bank.balance.toLocaleString()}</p>
                                        <p className="text-[10px] text-gray-400">最後更新: {bank.lastUpdated}</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <div className="flex-1 bg-emerald-50 p-2 rounded-xl text-center">
                                        <p className="text-[10px] text-emerald-600 font-bold">APY</p>
                                        <p className="text-sm font-bold text-emerald-700">{bank.apy}%</p>
                                    </div>
                                    <div className="flex-1 bg-blue-50 p-2 rounded-xl text-center">
                                        <p className="text-[10px] text-blue-600 font-bold">高利額度</p>
                                        <p className="text-sm font-bold text-blue-700">${bank.highInterestLimit.toLocaleString()}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderMemos = () => (
                <div className="flex-1 overflow-y-auto no-scrollbar pb-32 p-4 space-y-6">
                    <h1 className="text-2xl font-bold text-gray-800">備忘錄 / 分帳</h1>
                    <div className="space-y-4">
                        {memos.map(memo => (
                            <div 
                                key={memo.id} 
                                onClick={() => { setEditingMemo(memo); setIsMemoModalOpen(true); }}
                                className="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer"
                            >
                                <div className="w-12 h-12 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-500">
                                    <lucide.NotebookPen size={24} />
                                </div>
                                <div className="flex-1">
                                    <h3 className="font-bold text-gray-800">{memo.title}</h3>
                                    <p className="text-xs text-gray-400">對象: {memo.person} · {memo.type === 'monthly' ? '每月' : '單次'}</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-bold text-gray-800">${memo.amount.toLocaleString()}</p>
                                    <p className={`text-[10px] font-bold ${memo.isSettled ? 'text-emerald-500' : 'text-orange-500'}`}>
                                        {memo.isSettled ? '已結清' : '待處理'}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderStocks = () => (
                <div className="flex-1 overflow-y-auto no-scrollbar pb-32 p-4 space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-gray-800">投資組合</h1>
                        <button 
                            onClick={updateStockPrices}
                            disabled={isAiProcessing}
                            className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-emerald-500 active:scale-95 transition-transform"
                        >
                            {isAiProcessing ? <lucide.RefreshCw size={20} className="animate-spin" /> : <lucide.RefreshCw size={20} />}
                        </button>
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                        {stocks.map(stock => (
                            <div 
                                key={stock.id} 
                                onClick={() => { setEditingStock(stock); setIsStockModalOpen(true); }}
                                className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-4 active:scale-[0.98] transition-transform cursor-pointer"
                            >
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800">{stock.name}</h3>
                                        <p className="text-xs text-gray-400">{stock.code}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-xl font-bold text-gray-800">{stock.shares.toLocaleString()} 股</p>
                                        {stock.currentPrice ? (
                                            <p className={`text-xs font-bold ${stock.currentPrice * stock.shares >= stock.historicalCost ? 'text-emerald-500' : 'text-red-500'}`}>
                                                ${(stock.currentPrice * stock.shares).toLocaleString()} 
                                                ({(((stock.currentPrice * stock.shares) / stock.historicalCost - 1) * 100).toFixed(1)}%)
                                            </p>
                                        ) : (
                                            <p className="text-[10px] text-gray-400">成本: ${stock.historicalCost.toLocaleString()}</p>
                                        )}
                                    </div>
                                </div>
                                <div className="h-1 bg-gray-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-emerald-400 rounded-full" style={{ width: stock.currentPrice ? `${Math.min(100, (stock.currentPrice * stock.shares / stock.historicalCost) * 50)}%` : '50%' }} />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderAssets = () => {
                const totalBank = banks.reduce((sum, b) => sum + b.balance, 0);
                const totalStockValue = stocks.reduce((sum, s) => sum + (s.currentPrice ? s.currentPrice * s.shares : s.historicalCost), 0);
                const totalStockCost = stocks.reduce((sum, s) => sum + s.historicalCost, 0);
                const total = totalBank + totalStockValue;

                // 準備月度趨勢數據
                const last6Months = Array.from({ length: 6 }).map((_, i) => {
                    const d = subMonths(new Date(), 5 - i);
                    const monthStr = format(d, 'yyyy-MM');
                    const monthTxs = transactions.filter(t => t.date.startsWith(monthStr));
                    const inc = monthTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.convertedAmount, 0);
                    const exp = monthTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.convertedAmount, 0);
                    return { name: format(d, 'M月'), 收入: inc, 支出: exp };
                });

                const data = [
                    { name: '銀行', value: totalBank, color: '#6B8EAD' },
                    { name: '股票', value: totalStockValue, color: '#FFB7B2' }
                ];

                const stockProfit = totalStockValue - totalStockCost;
                const stockProfitRate = totalStockCost > 0 ? (stockProfit / totalStockCost) * 100 : 0;

                return (
                    <div className="flex-1 overflow-y-auto no-scrollbar pb-32 p-4 space-y-6">
                        <h1 className="text-2xl font-bold text-gray-800">總資產概覽</h1>
                        
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm text-center space-y-2">
                            <p className="text-sm text-gray-400 font-bold uppercase tracking-widest">目前總資產</p>
                            <h2 className="text-4xl font-bold text-gray-800 tracking-tight">
                                <span className="text-2xl mr-1">$</span>
                                {total.toLocaleString()}
                            </h2>
                            {totalStockCost > 0 && (
                                <p className={`text-xs font-bold ${stockProfit >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                    股票盈虧: {stockProfit >= 0 ? '+' : ''}{stockProfit.toLocaleString()} ({stockProfitRate.toFixed(1)}%)
                                </p>
                            )}
                        </div>

                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm h-64">
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 text-center">資產配置</p>
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie data={data} innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                        {data.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} />)}
                                    </Pie>
                                    <Tooltip />
                                    <Legend verticalAlign="bottom" height={36}/>
                                </PieChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm h-64">
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 text-center">最近半年收支趨勢</p>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={last6Months}>
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: '#9CA3AF' }} />
                                    <YAxis hide />
                                    <Tooltip cursor={{ fill: 'transparent' }} contentStyle={{ borderRadius: '1rem', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }} />
                                    <Bar dataKey="收入" fill="#B5EAD7" radius={[4, 4, 0, 0]} />
                                    <Bar dataKey="支出" fill="#FFB7B2" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="space-y-3">
                            {data.map(item => (
                                <div key={item.name} className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: item.color }} />
                                        <span className="font-bold text-gray-700">{item.name}</span>
                                    </div>
                                    <div className="text-right">
                                        <p className="font-bold text-gray-800">${item.value.toLocaleString()}</p>
                                        <p className="text-[10px] text-gray-400">{((item.value / total) * 100).toFixed(1)}%</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // --- Modal Components ---
            const TxModal = () => {
                const [tx, setTx] = React.useState(editingTx || initialTx || { 
                    id: generateId(), title: '', amount: 0, convertedAmount: 0, type: 'expense', category: '食', 
                    date: format(new Date(), 'yyyy-MM-dd'), paymentMethod: '現金', location: '國內', currency: 'TWD', notes: '' 
                });

                const save = () => {
                    if (!tx.title || !tx.amount) return;
                    const finalTx = { ...tx, convertedAmount: tx.amount };
                    if (editingTx) {
                        setTransactions(transactions.map(t => t.id === tx.id ? finalTx : t));
                    } else {
                        setTransactions([finalTx, ...transactions]);
                    }
                    setIsTxModalOpen(false);
                };

                const remove = () => {
                    setTransactions(transactions.filter(t => t.id !== tx.id));
                    setIsTxModalOpen(false);
                };

                return (
                    <ModalWrapper isOpen={isTxModalOpen} onClose={() => setIsTxModalOpen(false)} title={editingTx ? "編輯紀錄" : "新增紀錄"}>
                        <div className="space-y-6">
                            <div className="flex gap-2 p-1 bg-gray-100 rounded-2xl">
                                <button onClick={() => setTx({ ...tx, type: 'expense' })} className={`flex-1 py-3 rounded-xl font-bold transition-all ${tx.type === 'expense' ? 'bg-white text-orange-500 shadow-sm' : 'text-gray-400'}`}>支出</button>
                                <button onClick={() => setTx({ ...tx, type: 'income' })} className={`flex-1 py-3 rounded-xl font-bold transition-all ${tx.type === 'income' ? 'bg-white text-emerald-500 shadow-sm' : 'text-gray-400'}`}>收入</button>
                            </div>

                            <div className="space-y-4">
                                <div className="bg-gray-50 p-4 rounded-3xl space-y-4">
                                    <input type="text" value={tx.title} onChange={e => setTx({ ...tx, title: e.target.value })} placeholder="項目名稱 (例: 午餐)" className="w-full bg-transparent text-xl font-bold outline-none placeholder:text-gray-300" />
                                    <div className="flex items-center gap-2 border-t border-gray-200 pt-4">
                                        <span className="text-2xl font-bold text-gray-400">$</span>
                                        <input type="number" value={tx.amount || ''} onChange={e => setTx({ ...tx, amount: Number(e.target.value) })} placeholder="0" className="w-full bg-transparent text-3xl font-bold outline-none text-[#6B8EAD]" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-gray-400 font-bold ml-1">類別</label>
                                        <select value={tx.category} onChange={e => setTx({ ...tx, category: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none appearance-none font-bold text-gray-700">
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-gray-400 font-bold ml-1">日期</label>
                                        <input type="date" value={tx.date} onChange={e => setTx({ ...tx, date: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold text-gray-700" />
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">支付方式</label>
                                    <select value={tx.paymentMethod} onChange={e => setTx({ ...tx, paymentMethod: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none appearance-none font-bold text-gray-700">
                                        {PAYMENT_METHODS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>

                                <textarea value={tx.notes} onChange={e => setTx({ ...tx, notes: e.target.value })} placeholder="備註..." className="w-full bg-gray-50 rounded-2xl p-4 outline-none h-24 resize-none text-sm" />
                            </div>

                            <div className="flex gap-3">
                                {editingTx && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><lucide.Trash2 size={24} /></button>}
                                <button onClick={save} className="flex-1 py-4 bg-[#6B8EAD] text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">儲存紀錄</button>
                            </div>
                        </div>
                    </ModalWrapper>
                );
            };

            const CardModal = () => {
                const [card, setCard] = React.useState(editingCard || { 
                    id: generateId(), bank: '', name: '', cashbackRate: 0, spendingLimit: 0, 
                    paymentMethod: '', expirationDate: '', partnerChannels: '' 
                });

                const save = () => {
                    if (!card.name || !card.bank) return;
                    if (editingCard) {
                        setCards(cards.map(c => c.id === card.id ? card : c));
                    } else {
                        setCards([...cards, card]);
                    }
                    setIsCardModalOpen(false);
                };

                const remove = () => {
                    setCards(cards.filter(c => c.id !== card.id));
                    setIsCardModalOpen(false);
                };

                return (
                    <ModalWrapper isOpen={isCardModalOpen} onClose={() => setIsCardModalOpen(false)} title={editingCard ? "編輯信用卡" : "新增信用卡"}>
                        <div className="space-y-4">
                            <div className="bg-gray-50 p-4 rounded-3xl space-y-4">
                                <input type="text" value={card.bank} onChange={e => setCard({ ...card, bank: e.target.value })} placeholder="銀行名稱 (例: 台新)" className="w-full bg-transparent text-lg font-bold outline-none" />
                                <input type="text" value={card.name} onChange={e => setCard({ ...card, name: e.target.value })} placeholder="卡片名稱 (例: 玫瑰卡)" className="w-full bg-transparent text-xl font-bold outline-none" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">回饋率 (%)</label>
                                    <input type="number" value={card.cashbackRate || ''} onChange={e => setCard({ ...card, cashbackRate: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">額度上限</label>
                                    <input type="number" value={card.spendingLimit || ''} onChange={e => setCard({ ...card, spendingLimit: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">結帳日</label>
                                    <input type="text" value={card.paymentMethod} onChange={e => setCard({ ...card, paymentMethod: e.target.value })} placeholder="例: 每月 5 號" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">有效期限</label>
                                    <input type="text" value={card.expirationDate} onChange={e => setCard({ ...card, expirationDate: e.target.value })} placeholder="MM/YY" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] text-gray-400 font-bold ml-1">合作通路 / 備註</label>
                                <textarea value={card.partnerChannels} onChange={e => setCard({ ...card, partnerChannels: e.target.value })} className="w-full bg-gray-50 rounded-2xl p-4 outline-none h-20 resize-none text-sm" />
                            </div>
                            <div className="flex gap-3">
                                {editingCard && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><lucide.Trash2 size={24} /></button>}
                                <button onClick={save} className="flex-1 py-4 bg-[#6B8EAD] text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">儲存卡片</button>
                            </div>
                        </div>
                    </ModalWrapper>
                );
            };

            const BankModal = () => {
                const [bank, setBank] = React.useState(editingBank || { 
                    id: generateId(), bank: '', balance: 0, apy: 0, highInterestLimit: 0, 
                    highInterestDate: '', lastUpdated: format(new Date(), 'yyyy-MM-dd') 
                });

                const save = () => {
                    if (!bank.bank) return;
                    const finalBank = { ...bank, lastUpdated: format(new Date(), 'yyyy-MM-dd') };
                    if (editingBank) {
                        setBanks(banks.map(b => b.id === bank.id ? finalBank : b));
                    } else {
                        setBanks([...banks, finalBank]);
                    }
                    setIsBankModalOpen(false);
                };

                const remove = () => {
                    setBanks(banks.filter(b => b.id !== bank.id));
                    setIsBankModalOpen(false);
                };

                return (
                    <ModalWrapper isOpen={isBankModalOpen} onClose={() => setIsBankModalOpen(false)} title={editingBank ? "編輯網銀" : "新增網銀"}>
                        <div className="space-y-4">
                            <div className="bg-gray-50 p-4 rounded-3xl space-y-4">
                                <input type="text" value={bank.bank} onChange={e => setBank({ ...bank, bank: e.target.value })} placeholder="銀行名稱 (例: LINE Bank)" className="w-full bg-transparent text-xl font-bold outline-none" />
                                <div className="flex items-center gap-2 border-t border-gray-200 pt-4">
                                    <span className="text-2xl font-bold text-gray-400">$</span>
                                    <input type="number" value={bank.balance || ''} onChange={e => setBank({ ...bank, balance: Number(e.target.value) })} placeholder="目前餘額" className="w-full bg-transparent text-3xl font-bold outline-none text-[#6B8EAD]" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">年利率 APY (%)</label>
                                    <input type="number" step="0.01" value={bank.apy || ''} onChange={e => setBank({ ...bank, apy: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">高利限額</label>
                                    <input type="number" value={bank.highInterestLimit || ''} onChange={e => setBank({ ...bank, highInterestLimit: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] text-gray-400 font-bold ml-1">高利回饋日期 / 條件</label>
                                <input type="text" value={bank.highInterestDate} onChange={e => setBank({ ...bank, highInterestDate: e.target.value })} placeholder="例: 每月 20 號" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                            </div>
                            <div className="flex gap-3">
                                {editingBank && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><lucide.Trash2 size={24} /></button>}
                                <button onClick={save} className="flex-1 py-4 bg-[#6B8EAD] text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">儲存資訊</button>
                            </div>
                        </div>
                    </ModalWrapper>
                );
            };

            const MemoModal = () => {
                const [memo, setMemo] = React.useState(editingMemo || { 
                    id: generateId(), title: '', person: '', amount: 0, 
                    type: 'single', isSettled: false 
                });

                const save = () => {
                    if (!memo.title || !memo.amount) return;
                    if (editingMemo) {
                        setMemos(memos.map(m => m.id === memo.id ? memo : m));
                    } else {
                        setMemos([...memos, memo]);
                    }
                    setIsMemoModalOpen(false);
                };

                const remove = () => {
                    setMemos(memos.filter(m => m.id !== memo.id));
                    setIsMemoModalOpen(false);
                };

                return (
                    <ModalWrapper isOpen={isMemoModalOpen} onClose={() => setIsMemoModalOpen(false)} title={editingMemo ? "編輯備忘錄" : "新增備忘錄"}>
                        <div className="space-y-4">
                            <div className="bg-gray-50 p-4 rounded-3xl space-y-4">
                                <input type="text" value={memo.title} onChange={e => setMemo({ ...memo, title: e.target.value })} placeholder="備忘標題 (例: 晚餐代墊)" className="w-full bg-transparent text-xl font-bold outline-none" />
                                <div className="flex items-center gap-2 border-t border-gray-200 pt-4">
                                    <span className="text-2xl font-bold text-gray-400">$</span>
                                    <input type="number" value={memo.amount || ''} onChange={e => setMemo({ ...memo, amount: Number(e.target.value) })} placeholder="金額" className="w-full bg-transparent text-3xl font-bold outline-none text-purple-500" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">對象</label>
                                    <input type="text" value={memo.person} onChange={e => setMemo({ ...memo, person: e.target.value })} placeholder="人名" className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">類型</label>
                                    <select value={memo.type} onChange={e => setMemo({ ...memo, type: e.target.value })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold">
                                        <option value="single">單次</option>
                                        <option value="monthly">每月</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex items-center justify-between bg-gray-50 p-4 rounded-2xl">
                                <span className="font-bold text-gray-700">是否已結清</span>
                                <button 
                                    onClick={() => setMemo({ ...memo, isSettled: !memo.isSettled })}
                                    className={`w-12 h-6 rounded-full transition-colors relative ${memo.isSettled ? 'bg-emerald-400' : 'bg-gray-300'}`}
                                >
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${memo.isSettled ? 'left-7' : 'left-1'}`} />
                                </button>
                            </div>
                            <div className="flex gap-3">
                                {editingMemo && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><lucide.Trash2 size={24} /></button>}
                                <button onClick={save} className="flex-1 py-4 bg-[#6B8EAD] text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">儲存備忘</button>
                            </div>
                        </div>
                    </ModalWrapper>
                );
            };

            const StockModal = () => {
                const [stock, setStock] = React.useState(editingStock || { 
                    id: generateId(), name: '', code: '', shares: 0, historicalCost: 0, currentPrice: 0 
                });

                const save = () => {
                    if (!stock.name || !stock.code) return;
                    if (editingStock) {
                        setStocks(stocks.map(s => s.id === stock.id ? stock : s));
                    } else {
                        setStocks([...stocks, stock]);
                    }
                    setIsStockModalOpen(false);
                };

                const remove = () => {
                    setStocks(stocks.filter(s => s.id !== stock.id));
                    setIsStockModalOpen(false);
                };

                return (
                    <ModalWrapper isOpen={isStockModalOpen} onClose={() => setIsStockModalOpen(false)} title={editingStock ? "編輯股票" : "新增股票"}>
                        <div className="space-y-4">
                            <div className="bg-gray-50 p-4 rounded-3xl space-y-4">
                                <input type="text" value={stock.name} onChange={e => setStock({ ...stock, name: e.target.value })} placeholder="股票名稱 (例: 台積電)" className="w-full bg-transparent text-xl font-bold outline-none" />
                                <input type="text" value={stock.code} onChange={e => setStock({ ...stock, code: e.target.value })} placeholder="股票代號 (例: 2330)" className="w-full bg-transparent text-lg font-bold outline-none text-gray-400" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">持有股數</label>
                                    <input type="number" value={stock.shares || ''} onChange={e => setStock({ ...stock, shares: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] text-gray-400 font-bold ml-1">總成本 (TWD)</label>
                                    <input type="number" value={stock.historicalCost || ''} onChange={e => setStock({ ...stock, historicalCost: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold" />
                                </div>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] text-gray-400 font-bold ml-1">目前市價 (可手動輸入或 AI 更新)</label>
                                <input type="number" value={stock.currentPrice || ''} onChange={e => setStock({ ...stock, currentPrice: Number(e.target.value) })} className="w-full bg-gray-50 rounded-2xl py-3 px-4 outline-none font-bold text-emerald-600" />
                            </div>
                            <div className="flex gap-3">
                                {editingStock && <button onClick={remove} className="p-4 bg-red-50 text-red-500 rounded-2xl"><lucide.Trash2 size={24} /></button>}
                                <button onClick={save} className="flex-1 py-4 bg-[#6B8EAD] text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">儲存股票</button>
                            </div>
                        </div>
                    </ModalWrapper>
                );
            };

            const SettingsModal = () => (
                <ModalWrapper isOpen={isSettingsModalOpen} onClose={() => setIsSettingsModalOpen(false)} title="系統設定">
                    <div className="space-y-6">
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Gemini API Key</label>
                            <div className="relative">
                                <input 
                                    type="password" 
                                    value={geminiKey} 
                                    onChange={e => setGeminiKey(e.target.value)} 
                                    placeholder="輸入您的 API Key..." 
                                    className="w-full bg-gray-50 rounded-2xl py-4 px-4 outline-none focus:ring-2 focus:ring-[#6B8EAD] font-mono text-sm" 
                                />
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300">
                                    <lucide.BrainCircuit size={20} />
                                </div>
                            </div>
                            <p className="text-[10px] text-gray-400 ml-1">用於 AI 語音辨識與股票價格更新。Key 將儲存於本地瀏覽器中。</p>
                        </div>

                        <div className="space-y-3">
                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">資料管理</h3>
                            <button 
                                onClick={() => {
                                    const data = { transactions, cards, banks, memos, stocks };
                                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.download = `accounting_backup_${format(new Date(), 'yyyyMMdd')}.json`;
                                    a.click();
                                }}
                                className="w-full py-4 bg-white border border-gray-200 rounded-2xl font-bold text-gray-700 flex items-center justify-center gap-2 active:scale-95 transition-transform"
                            >
                                <lucide.Download size={20} className="text-[#6B8EAD]" /> 匯出備份資料 (JSON)
                            </button>
                            <button 
                                onClick={() => {
                                    const ws = XLSX.utils.json_to_sheet(transactions);
                                    const wb = XLSX.utils.book_new();
                                    XLSX.utils.book_append_sheet(wb, ws, "Transactions");
                                    XLSX.writeFile(wb, `accounting_export_${format(new Date(), 'yyyyMMdd')}.xlsx`);
                                }}
                                className="w-full py-4 bg-white border border-gray-200 rounded-2xl font-bold text-gray-700 flex items-center justify-center gap-2 active:scale-95 transition-transform"
                            >
                                <lucide.Download size={20} className="text-emerald-500" /> 匯出 Excel 報表 (XLSX)
                            </button>
                            <button 
                                onClick={() => {
                                    if (confirm('確定要清除所有資料嗎？此動作無法復原。')) {
                                        localStorage.clear();
                                        window.location.reload();
                                    }
                                }}
                                className="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform"
                            >
                                <lucide.Trash2 size={20} /> 清除所有本地資料
                            </button>
                        </div>

                        <div className="pt-4 text-center">
                            <p className="text-[10px] text-gray-300">Version 1.0.0 Standalone</p>
                        </div>
                    </div>
                </ModalWrapper>
            );

            const AiModal = () => (
                <ModalWrapper isOpen={isAiModalOpen} onClose={() => setIsAiModalOpen(false)} title="AI 智慧記帳">
                    <div className="space-y-6">
                        <div className="bg-purple-50 p-4 rounded-3xl border border-purple-100 flex items-start gap-3">
                            <div className="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-purple-500 shrink-0 shadow-sm">
                                <lucide.Sparkles size={20} />
                            </div>
                            <div>
                                <p className="text-xs font-bold text-purple-700 mb-1">自然語言輸入</p>
                                <p className="text-[10px] text-purple-600/70 leading-relaxed">您可以輸入如「今天在全家買了 100 元的早餐用 Line pay」，AI 會自動幫您解析並填寫表單。</p>
                            </div>
                        </div>

                        <div className="relative">
                            <textarea 
                                value={aiInput} 
                                onChange={e => setAiInput(e.target.value)} 
                                placeholder="輸入或貼上您的消費內容..." 
                                className="w-full bg-gray-50 rounded-[2rem] p-6 outline-none focus:ring-2 focus:ring-purple-400 h-40 resize-none text-gray-700 leading-relaxed"
                            />
                            <div className="absolute bottom-4 right-4 flex gap-2">
                                <button className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-400 shadow-sm active:scale-90 transition-transform">
                                    <lucide.Mic size={20} />
                                </button>
                                <button 
                                    onClick={processAiInput}
                                    disabled={isAiProcessing || !aiInput.trim()}
                                    className={`w-10 h-10 rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition-transform ${isAiProcessing || !aiInput.trim() ? 'bg-gray-300' : 'bg-purple-500'}`}
                                >
                                    {isAiProcessing ? <lucide.RefreshCw size={20} className="animate-spin" /> : <lucide.Send size={20} />}
                                </button>
                            </div>
                        </div>

                        <div className="space-y-3">
                            <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">常用範例</h3>
                            <div className="flex flex-wrap gap-2">
                                {['全家買早餐 85元', '加油 1200元 刷卡', '收到薪水 50000', '買衣服 1500 國外'].map(ex => (
                                    <button 
                                        key={ex} 
                                        onClick={() => setAiInput(ex)}
                                        className="px-3 py-2 bg-gray-100 rounded-xl text-[10px] font-bold text-gray-500 hover:bg-gray-200 transition-colors"
                                    >
                                        {ex}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </ModalWrapper>
            );

            // --- Main Render ---
            return (
                <div className="min-h-screen max-w-md mx-auto bg-[#F4F1ED] relative overflow-hidden flex flex-col font-sans shadow-xl">
                    {activeTab === '帳務' && renderAccounting()}
                    {activeTab === '信用卡' && renderCreditCards()}
                    {activeTab === '網銀' && renderBanking()}
                    {activeTab === '備忘錄' && renderMemos()}
                    {activeTab === '股票' && renderStocks()}
                    {activeTab === '總資產' && renderAssets()}

                    {/* Bottom Nav */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 pointer-events-none z-50">
                        <div className="bg-white/80 backdrop-blur-lg rounded-[2.5rem] shadow-[0_8px_32px_rgba(0,0,0,0.08)] px-4 py-3 flex justify-between items-center pointer-events-auto overflow-x-auto no-scrollbar gap-2 border border-white/20">
                            <NavButton icon={lucide.Wallet} label="帳務" isActive={activeTab === '帳務'} onClick={() => setActiveTab('帳務')} />
                            <NavButton icon={lucide.CreditCard} label="信用卡" isActive={activeTab === '信用卡'} onClick={() => setActiveTab('信用卡')} />
                            <NavButton icon={lucide.Landmark} label="網銀" isActive={activeTab === '網銀'} onClick={() => setActiveTab('網銀')} />
                            <NavButton icon={lucide.NotebookPen} label="備忘錄" isActive={activeTab === '備忘錄'} onClick={() => setActiveTab('備忘錄')} />
                            <NavButton icon={lucide.TrendingUp} label="股票" isActive={activeTab === '股票'} onClick={() => setActiveTab('股票')} />
                            <NavButton icon={lucide.PieChart} label="總資產" isActive={activeTab === '總資產'} onClick={() => setActiveTab('總資產')} />
                        </div>
                    </div>

                    {/* FAB */}
                    <button 
                        onClick={() => {
                            if (activeTab === '帳務') setIsTxModalOpen(true);
                            if (activeTab === '信用卡') setIsCardModalOpen(true);
                            if (activeTab === '網銀') setIsBankModalOpen(true);
                            if (activeTab === '備忘錄') setIsMemoModalOpen(true);
                            if (activeTab === '股票') setIsStockModalOpen(true);
                        }}
                        className={`fixed bottom-28 right-6 w-14 h-14 bg-[#6B8EAD] text-white rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(107,142,173,0.4)] hover:bg-[#4A6B8A] transition-colors active:scale-95 z-40 ${activeTab === '總資產' ? 'hidden' : ''}`}
                    >
                        <lucide.Plus size={32} strokeWidth={2.5} />
                    </button>

                    {/* Modals */}
                    {isTxModalOpen && <TxModal />}
                    {isCardModalOpen && <CardModal />}
                    {isBankModalOpen && <BankModal />}
                    {isMemoModalOpen && <MemoModal />}
                    {isStockModalOpen && <StockModal />}
                    {isAiModalOpen && <AiModal />}
                    {isSettingsModalOpen && <SettingsModal />}
                </div>
            );
        }

        // --- Render App ---
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            
            // 隱藏載入畫面
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, 800);
        } catch (e) {
            console.error("Render Error:", e);
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.innerHTML = `
                    <div class="p-8 text-center bg-white rounded-3xl shadow-xl max-w-xs mx-auto">
                        <p class="text-red-500 font-bold mb-4 text-lg">程式執行錯誤</p>
                        <p class="text-xs text-gray-500 break-all">${e.message}</p>
                        <button onclick="window.location.reload()" class="mt-4 w-full py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">重試</button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

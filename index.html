<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日系簡約記帳本</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-react@latest/dist/umd/lucide-react.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@google/genai@1.29.0/dist/index.min.js"></script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F4F1ED; margin: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loading-screen { position: fixed; inset: 0; background: #F4F1ED; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="w-12 h-12 border-4 border-[#6B8EAD] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[#6B8EAD] font-bold">載入中...</p>
    </div>
    <div id="root"></div>
    <script type="text/babel">
        const lucide = window.LucideReact;
        const { PieChart, Pie, Cell, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, Legend } = window.Recharts;
        const { format, startOfMonth, endOfMonth, parseISO, subMonths, isBefore } = window.dateFns;
        const { motion, AnimatePresence } = window.Motion || { motion: { div: 'div' }, AnimatePresence: ({children}) => children };

        function App() {
            const [activeTab, setActiveTab] = React.useState('帳務');
            const [transactions, setTransactions] = React.useState(() => JSON.parse(localStorage.getItem('transactions') || '[]'));
            const [geminiKey, setGeminiKey] = React.useState(() => localStorage.getItem('gemini_api_key') || '');

            React.useEffect(() => { localStorage.setItem('transactions', JSON.stringify(transactions)); }, [transactions]);

            const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

            return (
                <div className="min-h-screen max-w-md mx-auto bg-[#F4F1ED] p-4 pb-24">
                    <h1 className="text-2xl font-bold text-gray-800 mb-6">我的記帳本</h1>
                    <div className="bg-[#6B8EAD] rounded-3xl p-6 text-white shadow-xl mb-6">
                        <p className="text-white/70 text-sm">目前餘額</p>
                        <h2 className="text-4xl font-bold">${(totalIncome - totalExpense).toLocaleString()}</h2>
                    </div>
                    <div className="space-y-3">
                        {transactions.map(t => (
                            <div key={t.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                <div><p className="font-bold">{t.title}</p><p className="text-xs text-gray-400">{t.date}</p></div>
                                <p className={t.type === 'expense' ? 'text-red-500' : 'text-green-500'}>
                                    {t.type === 'expense' ? '-' : '+'}${t.amount}
                                </p>
                            </div>
                        ))}
                    </div>
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/80 backdrop-blur-md border-t flex justify-around">
                        <button className="text-[#6B8EAD] font-bold">帳務</button>
                        <button className="text-gray-400" onClick={() => alert('更多功能開發中')}>設定</button>
                    </div>
                    <button onClick={() => {
                        const title = prompt('項目名稱');
                        const amount = Number(prompt('金額'));
                        if(title && amount) setTransactions([{id: Date.now(), title, amount, type:'expense', date: new Date().toISOString().split('T')[0]}, ...transactions]);
                    }} className="fixed bottom-24 right-6 w-14 h-14 bg-[#6B8EAD] text-white rounded-full shadow-lg text-3xl">+</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loading-screen')?.remove(), 500));
    </script>
</body>
</html>
